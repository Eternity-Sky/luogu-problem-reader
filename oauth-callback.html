<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正在登录 - LGOJ</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent-color: #3b82f6;
        --border-color: #334155;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .callback-container {
        text-align: center;
        background: var(--bg-secondary);
        padding: 2.5rem;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        max-width: 400px;
        width: 90%;
      }
      .spinner {
        font-size: 2.5rem;
        color: var(--accent-color);
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 1rem;
      }
      p {
        color: var(--text-secondary);
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div class="callback-container">
      <div class="spinner"><i class="fas fa-spinner fa-spin"></i></div>
      <h1 id="status-title">正在处理登录...</h1>
      <p id="status-desc">请稍候，我们正在验证您的身份信息</p>
    </div>

    <script>
      async function handleCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get("code");
        const state = urlParams.get("state");
        const error = urlParams.get("error");

        const savedState = localStorage.getItem("oauth_state");
        const codeVerifier = localStorage.getItem("oauth_code_verifier");

        if (error) {
          redirectToLogin(
            `OAuth 错误: ${urlParams.get("error_description") || error}`,
          );
          return;
        }

        if (!code || state !== savedState) {
          redirectToLogin("登录请求无效或已过期");
          return;
        }

        try {
          // 1. 交换 Access Token
          updateStatus("正在获取令牌...", "正在与授权服务器通信");

          const tokenResponse = await fetch(
            "https://auth.luogu.me/api/oauth/token",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                grant_type: "authorization_code",
                code: code,
                redirect_uri: window.location.origin + "/oauth-callback.html",
                client_id: "f6f6fc17-ff19-45c2-a662-b4096d9085b4",
                client_secret: "JLlT8gRyaZEUuVd8n_CdMvTpTrG6tj5OwC56HIDpLZo",
                code_verifier: codeVerifier,
              }),
            },
          );

          if (!tokenResponse.ok) {
            throw new Error("令牌交换失败");
          }

          const { access_token } = await tokenResponse.json();

          // 2. 获取用户信息
          updateStatus("正在获取用户信息...", "同步您的竞赛编程资料");
          const userinfoResponse = await fetch(
            "https://auth.luogu.me/api/oauth/userinfo",
            {
              headers: { Authorization: `Bearer ${access_token}` },
            },
          );

          if (!userinfoResponse.ok) {
            throw new Error("获取用户信息失败");
          }

          const userData = await userinfoResponse.json();
          console.log("OAuth 用户信息:", userData);

          // 3. 提取洛谷身份信息
          // CP OAuth 返回的数据中可能包含关联的洛谷账号
          let luoguUid = null;
          if (userData.cp_details && userData.cp_details.luogu) {
            luoguUid = userData.cp_details.luogu.uid;
          }

          // 构造 LGOJ 用户信息
          const userInfo = {
            username: userData.username,
            name: userData.display_name || userData.username,
            uid: luoguUid,
            avatar: userData.avatar_url,
            loginTime: new Date().toISOString(),
            authType: "oauth",
            accessToken: access_token, // 保存令牌以便后续可能的使用
          };

          localStorage.setItem("luogu_user_info", JSON.stringify(userInfo));

          // 4. 清理 OAuth 临时数据并跳转
          localStorage.removeItem("oauth_state");
          localStorage.removeItem("oauth_code_verifier");

          updateStatus("登录成功！", "正在为您跳转到首页...");
          setTimeout(() => {
            window.location.href = "/";
          }, 1500);
        } catch (err) {
          console.error("OAuth 回调处理失败:", err);
          redirectToLogin("登录处理出错: " + err.message);
        }
      }

      function updateStatus(title, desc) {
        document.getElementById("status-title").textContent = title;
        document.getElementById("status-desc").textContent = desc;
      }

      function redirectToLogin(errorMsg) {
        window.location.href = `/login.html?error=${encodeURIComponent(errorMsg)}`;
      }

      handleCallback();
    </script>
  </body>
</html>
