<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>洛谷登录 - LGOJ</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent-color: #3b82f6;
        --accent-hover: #2563eb;
        --border-color: #334155;
        --card-bg: #1e293b;
        --radius: 6px;
        --transition: all 0.2s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-primary);
        min-height: 100vh;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .login-container {
        background: var(--card-bg);
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
        padding: 2.5rem;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .logo {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      .logo i {
        font-size: 2.5rem;
        color: var(--accent-color);
        margin-bottom: 1rem;
      }

      .logo h1 {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.025em;
        margin-bottom: 0.5rem;
      }

      .logo p {
        color: var(--text-secondary);
        font-size: 0.875rem;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .form-group input {
        width: 100%;
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 0.6rem 0.875rem;
        border-radius: var(--radius);
        font-size: 0.875rem;
        transition: var(--transition);
        outline: none;
      }

      .form-group input:focus {
        border-color: var(--accent-color);
      }

      .captcha-container {
        display: flex;
        gap: 0.75rem;
        align-items: center;
      }

      .captcha-image {
        width: 100px;
        height: 36px;
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        cursor: pointer;
        background: var(--bg-primary);
        overflow: hidden;
      }

      .btn {
        width: 100%;
        padding: 0.6rem 1rem;
        border: 1px solid transparent;
        border-radius: var(--radius);
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .btn-primary {
        background: var(--accent-color);
        color: white;
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      .btn-secondary {
        background: transparent;
        border-color: var(--border-color);
        color: var(--text-primary);
        margin-bottom: 0.75rem;
      }

      .btn-secondary:hover:not(:disabled) {
        background: var(--bg-primary);
        border-color: var(--text-secondary);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status-message {
        padding: 0.75rem;
        border-radius: var(--radius);
        margin-bottom: 1.5rem;
        font-size: 0.8125rem;
        text-align: center;
        display: none;
      }

      .status-success {
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
        border: 1px solid rgba(16, 185, 129, 0.2);
      }

      .status-error {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }

      .status-info {
        background: rgba(59, 130, 246, 0.1);
        color: #3b82f6;
        border: 1px solid rgba(59, 130, 246, 0.2);
      }

      .user-info {
        display: none;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .user-avatar {
        width: 64px;
        height: 64px;
        border-radius: 4px;
        border: 1px solid var(--border-color);
        margin-bottom: 1rem;
        overflow: hidden;
      }

      .user-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .user-name {
        font-size: 1.125rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
      }

      .user-uid {
        color: var(--text-secondary);
        font-size: 0.75rem;
        margin-bottom: 1.5rem;
      }

      .back-link {
        text-align: center;
        margin-top: 1.5rem;
      }

      .back-link a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.75rem;
        transition: var(--transition);
      }

      .back-link a:hover {
        color: var(--text-primary);
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <i class="fas fa-lock"></i>
        <h1>洛谷登录</h1>
        <p>使用您的洛谷账号以解锁更多功能</p>
      </div>

      <div id="statusMessage" class="status-message"></div>

      <div id="loginForm">
        <div class="form-group">
          <label for="username">用户名或邮箱</label>
          <input
            type="text"
            id="username"
            placeholder="请输入用户名或邮箱"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input
            type="password"
            id="password"
            placeholder="请输入密码"
            required
          />
        </div>

        <div class="form-group" id="captchaGroup" style="display: none">
          <label for="captcha">验证码</label>
          <div class="captcha-container">
            <input
              type="text"
              id="captcha"
              placeholder="验证码"
              style="flex: 1"
            />
            <div
              class="captcha-image"
              id="captchaImage"
              onclick="refreshCaptcha()"
            >
              <div
                style="
                  font-size: 0.75rem;
                  color: var(--text-secondary);
                  line-height: 36px;
                  text-align: center;
                "
              >
                点击获取
              </div>
            </div>
          </div>
        </div>

        <button
          type="button"
          class="btn btn-secondary"
          onclick="refreshCaptcha()"
          style="margin-top: 0.5rem"
        >
          <i class="fas fa-sync-alt"></i> 刷新验证码
        </button>

        <button
          type="button"
          class="btn btn-primary"
          id="loginBtn"
          onclick="login()"
          style="margin-top: 0.5rem"
        >
          登录
        </button>
      </div>

      <!-- 双重验证表单 -->
      <div id="twoFactorForm" style="display: none">
        <div class="form-group">
          <label for="verificationCode">双重验证码</label>
          <input
            type="text"
            id="verificationCode"
            placeholder="6位数字验证码"
            maxlength="6"
            required
          />
          <p
            style="
              color: var(--text-secondary);
              font-size: 0.75rem;
              margin-top: 0.5rem;
            "
          >
            请输入您手机或邮箱收到的验证码
          </p>
        </div>

        <button
          type="button"
          class="btn btn-primary"
          id="verifyBtn"
          onclick="verifyTwoFactor()"
        >
          验证并登录
        </button>

        <button
          type="button"
          class="btn btn-secondary"
          onclick="backToLogin()"
          style="margin-top: 0.75rem"
        >
          返回登录
        </button>
      </div>

      <div id="userInfo" class="user-info">
        <div class="user-avatar">
          <img id="userAvatar" src="" alt="用户头像" />
        </div>
        <div class="user-name" id="userName"></div>
        <div class="user-uid" id="userUid"></div>

        <button type="button" class="btn btn-primary" onclick="goToMainSite()">
          进入题库
        </button>

        <button
          type="button"
          class="btn btn-secondary"
          onclick="logout()"
          style="margin-top: 0.75rem"
        >
          退出登录
        </button>
      </div>

      <div class="back-link">
        <a href="index.html"> <i class="fas fa-arrow-left"></i> 返回首页 </a>
      </div>
    </div>

    <script>
      let loginCookies = "";
      let currentUser = null;
      let csrfToken = null;
      let pendingLoginData = null; // 存储待验证的登录数据

      // 生成会话ID（用于在代理中识别用户会话）
      let sessionId = localStorage.getItem("luogu_session_id");
      if (!sessionId) {
        sessionId =
          "session_" +
          Date.now() +
          "_" +
          Math.random().toString(36).substr(2, 9);
        localStorage.setItem("luogu_session_id", sessionId);
      }

      // 页面加载完成后初始化
      document.addEventListener("DOMContentLoaded", async () => {
        console.log("🚀 页面加载完成，初始化...");

        // 1. 尝试从 localStorage 加载已保存的用户信息
        const savedUser = localStorage.getItem("luogu_user_info");
        if (savedUser) {
          try {
            currentUser = JSON.parse(savedUser);
            console.log("📦 从 localStorage 加载到用户信息:", currentUser);
            showUserInfo(currentUser);
            showStatus(
              "欢迎回来, " + (currentUser.name || currentUser.username),
              "success",
            );
          } catch (e) {
            console.error("解析已保存的用户信息失败:", e);
            localStorage.removeItem("luogu_user_info");
          }
        }

        // 2. 无论是否有本地信息，都尝试通过 API 验证真实登录状态
        showStatus("正在验证登录状态...", "info");
        const isLoggedIn = await checkLoginStatus();

        if (!isLoggedIn) {
          console.log("ℹ️ 未登录或登录已过期，准备初始化登录表单");
          if (!savedUser) showStatus("请登录您的洛谷账号", "info");
          // 获取 CSRF Token 为登录做准备
          await getCSRFToken().catch((err) =>
            console.error("预取 CSRF Token 失败:", err),
          );
        } else {
          showStatus("登录状态验证成功", "success");
        }
      });

      // 代理函数 - 通过Netlify Functions调用洛谷API
      async function proxyLuoguAPI(path, options = {}) {
        const { method = "GET", body, headers = {} } = options;

        try {
          console.log("发起代理请求:", path, method);

          // 🎯 巧妙的Cookie回传机制：添加前端备份的Cookie
          const requestData = {
            path: path,
            method: method,
            body: body,
            csrfToken: csrfToken,
            headers: headers,
            sessionId: sessionId,
          };

          // 添加前端备份Cookie
          const backupCookies = localStorage.getItem("luogu_backup_cookies");
          if (backupCookies) {
            requestData.backupCookies = backupCookies;
            console.log(
              "📦 使用前端备份Cookie:",
              backupCookies.substring(0, 50) + "...",
            );
          }

          const response = await fetch("/.netlify/functions/luogu-proxy", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(requestData),
          });

          console.log("代理响应状态:", response.status);
          console.log("代理响应头:", response.headers.get("content-type"));

          // 🎯 处理响应中的Cookie备份
          if (response.ok) {
            try {
              const responseData = await response.clone().json();
              if (responseData._backupCookies) {
                localStorage.setItem(
                  "luogu_backup_cookies",
                  responseData._backupCookies,
                );
                console.log(
                  "💾 Cookie备份已保存到localStorage:",
                  responseData._backupCookies.substring(0, 20) + "...",
                );
              } else {
                console.log("ℹ️ 响应中没有Cookie备份信息");
              }
            } catch (e) {
              // 如果不是JSON响应，忽略Cookie备份处理
              console.log("ℹ️ 非JSON响应，跳过Cookie备份处理");
            }
          }

          // 🎯 额外检查：显示当前localStorage中的Cookie备份状态
          const currentBackup = localStorage.getItem("luogu_backup_cookies");
          if (currentBackup) {
            console.log(
              "📋 当前localStorage中的Cookie备份:",
              currentBackup.substring(0, 20) + "...",
            );
          } else {
            console.log("❌ localStorage中没有Cookie备份");
          }

          // 检查响应状态 - 但400状态码可能是正常的验证码错误
          if (!response.ok && response.status !== 400) {
            const errorText = await response.text();
            console.error("代理响应错误:", errorText);
            throw new Error(
              `代理请求失败: ${response.status} ${response.statusText}`,
            );
          }

          return response;
        } catch (error) {
          console.error("代理请求失败:", error);
          throw error;
        }
      }

      // 显示状态消息
      function showStatus(message, type = "info") {
        const statusEl = document.getElementById("statusMessage");
        statusEl.textContent = message;
        statusEl.className = `status-message status-${type}`;
        statusEl.style.display = "block";

        // 自动隐藏成功消息
        if (type === "success") {
          setTimeout(() => {
            statusEl.style.display = "none";
          }, 3000);
        }
      }

      // 获取CSRF Token并初始化会话
      async function getCSRFToken() {
        try {
          console.log("开始获取CSRF Token并初始化会话...");
          const response = await proxyLuoguAPI("/auth/login", {
            method: "GET",
            headers: {
              Accept:
                "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7",
            },
            requestType: "html", // 告诉代理函数这是一个HTML请求
          });

          if (response.status === 200) {
            let html = "";
            const contentType = response.headers.get("content-type") || "";

            if (contentType.includes("application/json")) {
              const jsonData = await response.json();
              html = jsonData.data || "";
              console.log("从 JSON 响应中提取到 HTML，长度:", html.length);
            } else {
              html = await response.text();
              console.log("直接获取到 HTML，长度:", html.length);
            }

            if (!html) {
              throw new Error("响应中没有 HTML 内容");
            }

            // 1. 优先尝试从 meta 标签提取 (现代浏览器标准方式)
            // 使用更健壮的正则表达式，不依赖属性顺序
            const metaCsrfRegex =
              /<meta[^>]*name=["']csrf-token["'][^>]*content=["']([^"']+)["'][^>]*>/i;
            const metaContentCsrfRegex =
              /<meta[^>]*content=["']([^"']+)["'][^>]*name=["']csrf-token["'][^>]*>/i;

            const metaMatch =
              html.match(metaCsrfRegex) || html.match(metaContentCsrfRegex);

            if (metaMatch && metaMatch[1]) {
              csrfToken = metaMatch[1];
              console.log(
                "✅ CSRF Token获取成功 (来自 meta 标签):",
                csrfToken.substring(0, 10) + "...",
              );
              return csrfToken;
            }

            // 2. 尝试从 lentille-context 提取 (洛谷新版架构)
            const lentilleMatch = html.match(
              /<script id="lentille-context" type="application\/json">(.*?)<\/script>/s,
            );
            if (lentilleMatch && lentilleMatch[1]) {
              try {
                const context = JSON.parse(lentilleMatch[1]);
                // 有些版本的 lentille-context 直接包含 csrfToken
                if (context.csrfToken) {
                  csrfToken = context.csrfToken;
                  console.log(
                    "✅ CSRF Token获取成功 (来自 lentille-context):",
                    csrfToken.substring(0, 10) + "...",
                  );
                  return csrfToken;
                }
              } catch (e) {
                console.warn("解析 lentille-context 失败:", e);
              }
            }

            // 3. 尝试从 window._feInjection 提取 (洛谷 React/Lentille 架构方式)
            const feMatch = html.match(
              /window\._feInjection\s*=\s*JSON\.parse\("([^"]+)"\)/,
            );
            if (feMatch && feMatch[1]) {
              try {
                // 洛谷会将 JSON 字符串进行转义，需要特殊处理
                const decodedJson = feMatch[1]
                  .replace(/\\"/g, '"')
                  .replace(/\\\\/g, "\\");
                const data = JSON.parse(decodedJson);
                if (data.csrfToken) {
                  csrfToken = data.csrfToken;
                  console.log(
                    "✅ CSRF Token获取成功 (来自 _feInjection):",
                    csrfToken.substring(0, 10) + "...",
                  );
                  return csrfToken;
                }
              } catch (parseErr) {
                console.warn("解析 _feInjection JSON 失败:", parseErr);
              }
            }

            // 4. 备用方案：查找表单 input
            const inputMatch =
              html.match(/name="csrf-token"\s+value="([^"]+)"/i) ||
              html.match(/value="([^"]+)"\s+name="csrf-token"/i);
            if (inputMatch && inputMatch[1]) {
              csrfToken = inputMatch[1];
              console.log(
                "✅ CSRF Token获取成功 (来自 input 标签):",
                csrfToken.substring(0, 10) + "...",
              );
              return csrfToken;
            }

            console.error("❌ 在响应 HTML 中未找到任何 CSRF Token 标识");
            console.log("HTML 片段:", html.substring(0, 1000));
          } else {
            console.error("❌ 获取登录页面失败，状态码:", response.status);
          }
          throw new Error("无法从登录页面提取 CSRF Token");
        } catch (error) {
          console.error("获取 CSRF Token 过程出错:", error);
          throw error;
        }
      }

      // 刷新验证码
      async function refreshCaptcha() {
        try {
          console.log("开始获取验证码，当前sessionId:", sessionId);

          // 确保会话已初始化（获取CSRF Token）
          if (!csrfToken) {
            console.log("会话未初始化，先获取CSRF Token...");
            await getCSRFToken();
          }

          const response = await proxyLuoguAPI("/lg4/captcha", {
            method: "GET",
          });

          console.log("代理响应状态:", response.status);
          console.log("代理响应头:", response.headers.get("content-type"));

          if (response.status === 200) {
            const blob = await response.blob();
            console.log("验证码图片大小:", blob.size, "bytes");

            const captchaUrl = URL.createObjectURL(blob);
            const captchaContainer = document.getElementById("captchaImage");
            captchaContainer.innerHTML = `<img src="${captchaUrl}" alt="验证码" style="width: 100%; height: 100%; object-fit: cover;">`;

            // 显示验证码输入组
            document.getElementById("captchaGroup").style.display = "block";
            document.getElementById("captcha").value = "";

            console.log("验证码图片已更新");
          } else {
            throw new Error(`获取验证码失败: ${response.status}`);
          }
        } catch (error) {
          console.error("刷新验证码失败:", error);
          showStatus("获取验证码失败: " + error.message, "error");
        }
      }

      // 登录
      async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const captcha = document.getElementById("captcha").value.trim();

        if (!username || !password) {
          showStatus("请输入用户名和密码", "error");
          return;
        }

        const loginBtn = document.getElementById("loginBtn");
        const originalText = loginBtn.innerHTML;
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';

        try {
          // 确保有CSRF Token
          if (!csrfToken) {
            await getCSRFToken();
          }

          if (!csrfToken) {
            throw new Error("无法获取CSRF Token");
          }

          // 发送登录请求
          console.log("登录请求参数:", {
            username: username,
            password: "***",
            captcha: captcha,
            sessionId: sessionId.substring(0, 10) + "...",
            csrfToken: csrfToken ? csrfToken.substring(0, 10) + "..." : "null",
          });

          const response = await proxyLuoguAPI("/do-auth/password", {
            method: "POST",
            body: {
              username: username,
              password: password,
              captcha: captcha,
            },
          });

          console.log("登录响应状态:", response.status);

          // 处理响应
          const data = await response.json();
          console.log("登录响应数据:", data);

          if (response.status === 200) {
            // 200状态码，检查是否有用户信息（表示登录成功）
            console.log("检查登录成功条件:");
            console.log("- data.username:", data.username);
            console.log("- data.syncToken:", data.syncToken);
            console.log("- 条件结果:", !!(data.username && data.syncToken));

            if (data.username && data.syncToken) {
              // 有用户名和同步令牌，说明登录成功
              console.log("✅ 登录成功判断通过");
              showStatus("登录成功！", "success");

              // 🎯 强制措施：使用固定全局sessionId，彻底解决时间差问题
              const FIXED_GLOBAL_SESSION_ID = "session_luogu_global_fixed_2025";
              localStorage.setItem("luogu_session_id", FIXED_GLOBAL_SESSION_ID);
              console.log(
                "🔒 强制使用固定全局sessionId:",
                FIXED_GLOBAL_SESSION_ID,
              );
              console.log(
                "🎯 强制措施：sessionId永不改变，Cookie与sessionId完美同步",
              );

              // 登录成功后，尝试获取完整的用户信息（包括UID）
              console.log("🔍 登录成功，尝试获取完整用户信息...");

              try {
                // 先从syncToken中提取UID
                let extractedUid = null;
                if (data.syncToken) {
                  const match = data.syncToken.match(/\+(\d+)$/);
                  if (match) {
                    extractedUid = parseInt(match[1]);
                    console.log("🔍 从syncToken中提取到UID:", extractedUid);
                  }

                if (!extractedUid) {
                  throw new Error("无法从syncToken中提取UID");
                }

                // 使用提取的UID调用正确的用户信息接口
                // 根据API文档，DataResponse格式的请求需要特殊头字段
                const userInfoResponse = await proxyLuoguAPI(
                  `/user/${extractedUid}`,
                  {
                    method: "GET",
                    headers: {
                      "x-luogu-type": "content-only",
                    },
                  },
                );

                if (userInfoResponse.status === 200) {
                  const responseData = await userInfoResponse.json();
                  console.log("🔍 获取到用户数据响应:", responseData);

                  // 根据API文档，响应格式为 DataResponse<UserData>
                  // 用户信息在 currentData.user 中
                  let fullUserInfo = null;
                  if (
                    responseData.currentData &&
                    responseData.currentData.user

                    fullUserInfo = responseData.currentData.user;

                  } else if (responseData.currentUser) {

                      "✅ 从currentUser字段找到用户信息:",

                      "⚠️ 响应格式不符合预期:",
                      Object.keys(responseData),

                  const userInfo = {
                    username: data.username,
                    syncToken: data.syncToken,
                    locked: data.locked || false,
                    loginTime: new Date().toISOString(),
                    // 添加完整用户信息

                    name: fullUserInfo.name || data.username,
                    avatar: fullUserInfo.avatar,

                    ranking: fullUserInfo.ranking,

                  localStorage.setItem(
                    "luogu_user_info",

                  console.log("💾 完整用户信息已保存到localStorage:", userInfo);
                  console.log("🔑 登录使用的sessionId:", sessionId);

                  // 显示完整用户信息
                  showUserInfo(userInfo);
                } else {
                  throw new Error(
                    `用户信息请求失败: ${userInfoResponse.status}`,
                  );
                }
              } catch (error) {
                console.warn(
                  "获取完整用户信息失败，尝试从syncToken提取UID:",
                  error,
                );

                // 尝试从syncToken中提取UID
                let extractedUid = null;
                if (data.syncToken) {
                  // syncToken格式通常是: "token+uid"，尝试提取最后的数字
                  const match = data.syncToken.match(/\+(\d+)$/);
                  if (match) {
                    extractedUid = parseInt(match[1]);
                    console.log("🔍 从syncToken中提取到UID:", extractedUid);
                  }
                }

                // 构建用户信息，包含提取的UID
                const userInfo = {
                  username: data.username,
                  syncToken: data.syncToken,
                  locked: data.locked || false,
                  loginTime: new Date().toISOString(),
                  // 添加提取的UID和推测的用户信息
                  uid: extractedUid,
                  name: data.username, // 使用username作为显示名称

                localStorage.setItem(
                  "luogu_user_info",
                  JSON.stringify(userInfo),

                console.log("💾 增强用户信息已保存到localStorage:", userInfo);

                // 如果有UID，显示完整用户信息；否则显示基本信息
                if (extractedUid) {

                  console.log("⚠️ 无法提取UID，显示基本用户信息");

              showStatus(
                "登录成功！用户信息已保存，请查看控制台调试信息",

              // 如果需要跳转，可以手动取消下面的注释
              setTimeout(() => {
                const returnUrl =
                  data.redirectTo ||
                  new URLSearchParams(window.location.search).get("return") ||
                  "/";
                window.location.href = returnUrl;
              }, 1500);
            } else if (
              data.success === false ||
              data.message ||
              data.errorMessage
            ) {
              // 检查是否需要双重验证
              const errorMsg = data.message || data.errorMessage || "登录失败";

              if (
                errorMsg.includes("双重验证") ||
                errorMsg.includes("验证码") ||
                errorMsg.includes("two-factor") ||
                errorMsg.includes("2FA") ||
                data.requireTwoFactor ||
                data.needVerification
              ) {
                // 需要双重验证

              const loginCheckResult = await checkLoginStatus();
              if (!loginCheckResult) {
                showStatus("登录状态不明确，请重试", "warning");

            // 400状态码，可能是验证码错误，也可能是登录成功但状态码不同
            console.log("400状态码详情:", data);

            // 先检查是否实际登录成功（通过检查用户数据）
            console.log("400状态码，尝试检查登录状态...");
            const loginCheckResult = await checkLoginStatus();

              const errorMsg =
                data.errorMessage || data.message || "请求参数错误";

              if (
                errorMsg.includes("验证码") ||
                errorMsg.includes("captcha") ||
                (data.errorType &&

              data.message ||

            showStatus("登录失败: " + errorMsg, "error");

          console.error("登录失败:", error);
          showStatus("登录失败: " + error.message, "error");

          loginBtn.disabled = false;

        }

      // 检查登录状态
      async function checkLoginStatus() {
        try {
          console.log("🔍 开始检查登录状态...");
          const response = await proxyLuoguAPI("/_lfe/config");

          console.log("登录状态检查响应状态:", response.status);
          console.log(
            "登录状态检查响应头:",
            response.headers.get("content-type"),
          );

          if (response.ok) {
            const data = await response.json();
            console.log("登录状态检查完整响应:", data);

            if (data.currentUser) {
              console.log("✅ 检测到登录用户:", data.currentUser);
              currentUser = data.currentUser;
              showUserInfo(currentUser);
              return true;
            } else {
              console.log("❌ 响应中没有currentUser字段");
              console.log("响应数据结构:", Object.keys(data));

              // 查找可能包含用户信息的字段
              const possibleUserFields = [
                "user",
                "currentUser",
                "loginUser",
                "userInfo",
                "me",
                "profile",
              ];
              const foundUserFields = possibleUserFields.filter((field) =>
                data.hasOwnProperty(field),
              );
              console.log("可能的用户字段:", foundUserFields);

              // 检查是否有其他可能的用户相关字段
              const userRelatedKeys = Object.keys(data).filter(
                (key) =>
                  key.toLowerCase().includes("user") ||
                  key.toLowerCase().includes("login") ||
                  key.toLowerCase().includes("auth"),
              );
              console.log("用户相关的字段:", userRelatedKeys);

              // 尝试查找用户信息
              let foundUser = null;
              for (const field of possibleUserFields) {
                if (data[field] && typeof data[field] === "object") {
                  console.log(`发现可能的用户字段 ${field}:`, data[field]);
                  foundUser = data[field];
                  break;
                }
              }

              if (foundUser) {
                console.log("✅ 找到用户信息:", foundUser);
                currentUser = foundUser;
                showUserInfo(foundUser);
                return true;
              } else {
                showStatus("未检测到登录状态", "warning");
                return false;
              }
            }
          } else if (response.status === 302) {
            console.log("⚠️ 收到302重定向，可能需要重新登录");
            showStatus("登录状态已过期，请重新登录", "warning");
            return false;
          } else {
            console.log("❌ 登录状态检查请求失败:", response.status);
            const errorText = await response.text();
            console.log("错误响应内容:", errorText);
            return false;
          }
        } catch (error) {
          console.error("检查登录状态失败:", error);
        }
      }

      // 发送双重验证码
      async function sendVerificationCode() {
        if (!pendingLoginData) {
          showStatus("请先完成基本登录验证", "error");
          return;
        }

        const sendBtn = document.getElementById("sendCodeBtn");
        const originalText = sendBtn.innerHTML;
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';

        try {
          console.log("🔍 发送双重验证码...");

          const response = await proxyLuoguAPI(
            "/api/verify/sendVerificationCode",
            {
              method: "POST",
              body: {
                // 根据API文档，可能需要的参数
                username: pendingLoginData.username,
                type: "login", // 或其他类型
              },
            },
          );

          console.log("📊 发送验证码响应状态:", response.status);

          if (response.ok) {
            const data = await response.json();
            console.log("✅ 验证码发送成功:", data);
            showStatus("验证码已发送，请查收短信或邮箱", "success");

            // 开始倒计时
            startCountdown(sendBtn, originalText, 60);
          } else {
            const errorText = await response.text();
            console.error("❌ 发送验证码失败:", response.status, errorText);
            showStatus(`发送验证码失败: ${response.status}`, "error");
            sendBtn.disabled = false;
            sendBtn.innerHTML = originalText;
          }
        } catch (error) {
          console.error("❌ 发送验证码异常:", error);
          showStatus("发送验证码失败，请重试", "error");
          sendBtn.disabled = false;
          sendBtn.innerHTML = originalText;
        }
      }

      // 验证双重验证码并完成登录
      async function verifyTwoFactor() {
        const verificationCode = document
          .getElementById("verificationCode")
          .value.trim();

        if (!verificationCode) {
          showStatus("请输入验证码", "error");
          return;
        }

        if (!pendingLoginData) {
          showStatus("登录会话已过期，请重新登录", "error");
          backToLogin();
          return;
        }

        const verifyBtn = document.getElementById("verifyBtn");
        const originalText = verifyBtn.innerHTML;
        verifyBtn.disabled = true;
        verifyBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin"></i> 验证中...';

        try {
          console.log("🔍 验证双重验证码...");

          // 重新发送登录请求，这次包含验证码
          const response = await proxyLuoguAPI("/do-auth/password", {
            method: "POST",
            body: {
              username: pendingLoginData.username,
              password: pendingLoginData.password,
              captcha: pendingLoginData.captcha,
              verificationCode: verificationCode, // 添加验证码
            },
          });

          console.log("📊 双重验证登录响应状态:", response.status);

          const data = await response.json();
          console.log("📊 双重验证登录响应数据:", data);

          if (response.status === 200 && data.username && data.syncToken) {
            // 登录成功，处理用户信息
            console.log("✅ 双重验证登录成功");
            showStatus("双重验证成功，登录完成！", "success");

            // 清理待验证数据
            pendingLoginData = null;

            // 隐藏双重验证表单
            document.getElementById("twoFactorForm").style.display = "none";

            // 处理登录成功后的用户信息（复用现有逻辑）
            await handleLoginSuccess(data);
          } else {
            console.error("❌ 双重验证失败:", data);
            showStatus(data.errorMessage || "验证码错误，请重试", "error");
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = originalText;
          }
        } catch (error) {
          console.error("❌ 双重验证异常:", error);
          showStatus("验证失败，请重试", "error");
          verifyBtn.disabled = false;
          verifyBtn.innerHTML = originalText;
        }
      }

      // 倒计时功能
      function startCountdown(button, originalText, seconds) {
        let remaining = seconds;
        const interval = setInterval(() => {
          button.innerHTML = `<i class="fas fa-clock"></i> ${remaining}秒后重新发送`;
          remaining--;

          if (remaining < 0) {
            clearInterval(interval);
            button.disabled = false;
            button.innerHTML = originalText;
          }
        }, 1000);
      }

      // 处理登录成功的逻辑（提取为独立函数）
      async function handleLoginSuccess(data) {
        try {
          // 先从syncToken中提取UID
          let extractedUid = null;
          if (data.syncToken) {
            const match = data.syncToken.match(/\+(\d+)$/);
            if (match) {
              extractedUid = parseInt(match[1]);
              console.log("🔍 从syncToken中提取到UID:", extractedUid);
            }
          }

          if (!extractedUid) {
            throw new Error("无法从syncToken中提取UID");
          }

          // 使用提取的UID调用正确的用户信息接口
          const userInfoResponse = await proxyLuoguAPI(
            `/user/${extractedUid}`,
            {
              method: "GET",
              headers: {
                "x-luogu-type": "content-only",
              },
            },
          );

          if (userInfoResponse.status === 200) {
            const responseData = await userInfoResponse.json();
            console.log("🔍 获取到用户数据响应:", responseData);

            let fullUserInfo = null;
            if (responseData.currentData && responseData.currentData.user) {
              fullUserInfo = responseData.currentData.user;
              console.log("✅ 从API响应中找到用户信息:", fullUserInfo);
            }

            if (fullUserInfo) {
              const userInfo = {
                ...fullUserInfo,
                username: data.username,
                syncToken: data.syncToken,
                locked: data.locked || false,
                loginTime: new Date().toISOString(),
              };

              localStorage.setItem("luogu_user_info", JSON.stringify(userInfo));
              console.log("💾 完整用户信息已保存到localStorage:", userInfo);

              showUserInfo(userInfo);
            } else {
              throw new Error("无法获取完整用户信息");
            }
          } else {
            throw new Error(`用户信息请求失败: ${userInfoResponse.status}`);
          }
        } catch (error) {
          console.warn("获取完整用户信息失败，使用基本信息:", error);

          // 构建基本用户信息
          const userInfo = {
            username: data.username,
            syncToken: data.syncToken,
            locked: data.locked || false,
            loginTime: new Date().toISOString(),
            uid: extractedUid,
            name: data.username,
            avatar: extractedUid
              ? `https://cdn.luogu.com.cn/upload/usericon/${extractedUid}.png`
              : null,
          };

          localStorage.setItem("luogu_user_info", JSON.stringify(userInfo));
          console.log("💾 基本用户信息已保存到localStorage:", userInfo);

          if (extractedUid) {
            showUserInfo(userInfo);
          } else {
            displayUserInfo(userInfo);
          }
        }
      }

      // 页面加载时初始化
      window.addEventListener("load", async function () {
        await getCSRFToken();
        await checkLoginStatus();
      });

      // 回车键登录
      document.addEventListener("keypress", function (e) {
        if (
          e.key === "Enter" &&
          document.getElementById("loginForm").style.display !== "none"
        ) {
          login();
        }
      });
    </script>
  </body>
</html>
