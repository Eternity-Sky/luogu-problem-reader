<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>题目列表 - LGOJ</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent-color: #3b82f6;
        --accent-hover: #2563eb;
        --border-color: #334155;
        --card-bg: #1e293b;
        --radius: 4px;
        --transition: all 0.2s ease;

        /* 难度颜色 - 商务淡化处理 */
        --diff-0: #94a3b8; /* 暂无 */
        --diff-1: #10b981; /* 入门 - 绿 */
        --diff-2: #3b82f6; /* 普及- - 蓝 */
        --diff-3: #f59e0b; /* 普及/提高- - 黄 */
        --diff-4: #ef4444; /* 普及+/提高 - 红 */
        --diff-5: #8b5cf6; /* 提高+/省选- - 紫 */
        --diff-6: #ec4899; /* 省选/NOI- - 粉 */
        --diff-7: #1e293b; /* NOI/NOI+/CTSC - 深蓝 */
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-primary);
        min-height: 100vh;
        color: var(--text-primary);
        line-height: 1.5;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1.5rem;
      }

      /* Header */
      header {
        background-color: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--border-color);
        padding: 0.75rem 0;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-primary);
        text-decoration: none;
        letter-spacing: -0.025em;
      }

      .logo i {
        margin-right: 0.5rem;
        color: var(--accent-color);
      }

      nav ul {
        display: flex;
        list-style: none;
        align-items: center;
        gap: 0.5rem;
      }

      nav ul li a {
        color: var(--text-secondary);
        text-decoration: none;
        font-weight: 500;
        transition: var(--transition);
        padding: 0.4rem 0.8rem;
        font-size: 0.875rem;
        border-radius: var(--radius);
      }

      nav ul li a:hover,
      nav ul li a.active {
        color: var(--text-primary);
        background-color: var(--bg-secondary);
      }

      /* 页面标题 */
      .page-header {
        padding: 2.5rem 0 1.5rem;
      }

      .page-header h1 {
        font-size: 1.875rem;
        font-weight: 800;
        letter-spacing: -0.025em;
        margin-bottom: 0.25rem;
      }

      .page-header p {
        color: var(--text-secondary);
        font-size: 0.875rem;
      }

      /* 筛选器 */
      .filters {
        background: var(--bg-secondary);
        padding: 1rem;
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
        margin-bottom: 1.5rem;
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        align-items: center;
      }

      .filter-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .filter-group label {
        color: var(--text-secondary);
        font-size: 0.8125rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.025em;
      }

      select,
      input {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 0.4rem 0.6rem;
        border-radius: var(--radius);
        font-size: 0.875rem;
        outline: none;
        transition: var(--transition);
      }

      select:focus,
      input:focus {
        border-color: var(--accent-color);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--accent-color);
        color: white;
        border: none;
        padding: 0.4rem 1rem;
        border-radius: var(--radius);
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition);
      }

      .btn:hover {
        background: var(--accent-hover);
      }

      .btn-secondary {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-primary);
      }

      .btn-secondary:hover {
        background: var(--bg-primary);
        border-color: var(--text-secondary);
      }

      /* 题目列表表格 - 高密度 */
      .problems-table-container {
        background: var(--bg-secondary);
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th {
        background: rgba(15, 23, 42, 0.3);
        padding: 0.75rem 1rem;
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid var(--border-color);
        text-align: left;
      }

      td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border-color);
        color: var(--text-primary);
        font-size: 0.875rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }

      .col-pid {
        width: 100px;
      }
      .col-title {
        width: auto;
      }
      .col-difficulty {
        width: 140px;
      }
      .col-stats {
        width: 120px;
        text-align: right;
      }

      .pid {
        font-family: "JetBrains Mono", monospace;
        color: var(--accent-color);
        font-weight: 600;
        font-size: 0.8125rem;
      }

      .title-link {
        color: var(--text-primary);
        text-decoration: none;
        font-weight: 500;
        transition: var(--transition);
      }

      .title-link:hover {
        color: var(--accent-color);
      }

      /* 精致难度标签 */
      .difficulty-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.8125rem;
        font-weight: 500;
      }

      .difficulty-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }

      /* 分页 */
      .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        margin: 2rem 0 4rem;
      }

      .page-btn {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 0.4rem 0.8rem;
        border-radius: var(--radius);
        cursor: pointer;
        transition: var(--transition);
        font-size: 0.8125rem;
        font-weight: 500;
      }

      .page-btn:hover:not(:disabled) {
        border-color: var(--text-secondary);
        background: var(--bg-primary);
      }

      .page-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .current-page {
        color: var(--text-secondary);
        font-size: 0.8125rem;
        margin: 0 1rem;
      }

      /* 用户卡片 */
      .user-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 0.75rem 1rem;
        margin-bottom: 1.5rem;
        display: none;
        align-items: center;
        gap: 1rem;
      }

      .user-card.show {
        display: flex;
      }

      .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 4px;
        border: 1px solid var(--border-color);
      }

      .user-name {
        font-weight: 600;
        font-size: 0.875rem;
      }

      .user-uid {
        color: var(--text-secondary);
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="container header-container">
        <a href="/" class="logo">
          <i class="fas fa-book"></i>
          LGOJ
        </a>
        <nav>
          <ul>
            <li><a href="/">首页</a></li>
            <li><a href="/problems.html" class="active">题库</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="container">
      <!-- 用户信息显示 -->
      <div id="userInfo" class="user-card">
        <img id="userAvatar" class="user-avatar" src="" alt="用户头像" />
        <div class="user-details">
          <div id="userName" class="user-name"></div>
          <div id="userUid" class="user-uid"></div>
        </div>
      </div>

      <!-- 登录提示 -->
      <div
        id="loginPrompt"
        class="user-card"
        style="justify-content: center; text-align: center; padding: 1.5rem"
      >
        <div>
          <p
            style="
              margin-bottom: 1rem;
              color: var(--text-secondary);
              font-size: 0.875rem;
            "
          >
            登录后可以查看更多题目信息和提交记录
          </p>
          <a href="/login.html" class="btn">
            <i class="fas fa-sign-in-alt"></i>
            立即登录
          </a>
        </div>
      </div>

      <!-- 页面标题 -->
      <div class="page-header">
        <h1>题库</h1>
        <p>探索并浏览洛谷平台的算法题目</p>
      </div>

      <!-- 筛选器 -->
      <div class="filters">
        <div class="filter-group">
          <label for="pageInput">页码</label>
          <input
            type="number"
            id="pageInput"
            value="1"
            min="1"
            style="width: 80px"
          />
        </div>

        <div class="filter-group">
          <label for="difficultyFilter">难度</label>
          <select id="difficultyFilter">
            <option value="">全部难度</option>
            <option value="0">暂无评定</option>
            <option value="1">入门</option>
            <option value="2">普及-</option>
            <option value="3">普及/提高-</option>
            <option value="4">普及+/提高</option>
            <option value="5">提高+/省选-</option>
            <option value="6">省选/NOI-</option>
            <option value="7">NOI/NOI+/CTSC</option>
          </select>
        </div>

        <div style="flex: 1"></div>

        <button class="btn" onclick="loadProblems()">
          <i class="fas fa-search"></i> 筛选
        </button>

        <button class="btn btn-secondary" onclick="loadProblems(true)">
          <i class="fas fa-sync"></i> 刷新
        </button>
      </div>

      <!-- 题目列表展示 -->
      <div id="problemListDisplay">
        <div
          style="
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
          "
        >
          <i
            class="fas fa-spinner fa-spin"
            style="font-size: 1.5rem; margin-bottom: 1rem"
          ></i>
          <p>正在加载题目列表...</p>
        </div>
      </div>
    </div>

    <script>
      // 获取难度颜色
      function getDifficultyColor(difficulty) {
        return `var(--diff-${difficulty || 0})`;
      }

      // 获取难度文本
      function getDifficultyText(difficulty) {
        const texts = {
          0: "暂无评定",
          1: "入门",
          2: "普及-",
          3: "普及/提高-",
          4: "普及+/提高",
          5: "提高+/省选-",
          6: "省选/NOI-",
          7: "NOI/NOI+/CTSC",
        };
        return texts[difficulty] || "未知";
      }

      // 代理函数 - 通过Netlify Functions调用洛谷API
      async function proxyLuoguAPI(path, options = {}) {
        const requestData = {
          path: path,
          method: options.method || "GET",
          headers: {
            "x-luogu-type": "content-only",
            ...options.headers,
          },
          sessionId:
            localStorage.getItem("luogu_session_id") ||
            "session_luogu_global_fixed_2025",
          ...options,
        };

        try {
          const response = await fetch("/.netlify/functions/luogu-proxy", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(requestData),
          });

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const result = await response.json();
          return result;
        } catch (error) {
          console.error("❌ 网络请求失败:", error);
          return { error: error.message };
        }
      }

      // 加载题目列表
      async function loadProblems(forceRefresh = false) {
        const container = document.getElementById("problemListDisplay");
        container.innerHTML = `
          <div style="text-align: center; padding: 4rem; color: var(--text-secondary)">
            <i class="fas fa-spinner fa-spin" style="font-size: 1.5rem; margin-bottom: 1rem"></i>
            <p>正在获取题目数据...</p>
          </div>
        `;

        const page = document.getElementById("pageInput").value || 1;
        const difficulty = document.getElementById("difficultyFilter").value;

        let apiPath = `/problem/list?page=${page}`;
        if (difficulty !== "") {
          apiPath += `&difficulty=${difficulty}`;
        }

        try {
          const result = await proxyLuoguAPI(apiPath);
          if (result.error) {
            container.innerHTML = `<div style="text-align: center; padding: 2rem; color: #ef4444;">加载失败: ${result.error}</div>`;
            return;
          }
          displayProblemTable(result);
        } catch (error) {
          container.innerHTML = `<div style="text-align: center; padding: 2rem; color: #ef4444;">请求失败: ${error.message}</div>`;
        }
      }

      // 显示题目表格
      function displayProblemTable(apiResult) {
        const container = document.getElementById("problemListDisplay");
        container.innerHTML = "";

        let problems = [];
        let count = 0;
        let perPage = 50;

        if (apiResult.data && apiResult.data.problems) {
          problems = apiResult.data.problems.result || [];
          count = apiResult.data.problems.count || 0;
          perPage = apiResult.data.problems.perPage || 50;
        }

        if (problems.length === 0) {
          container.innerHTML =
            '<div style="text-align: center; padding: 4rem; color: var(--text-secondary);">暂无题目数据</div>';
          return;
        }

        const tableContainer = document.createElement("div");
        tableContainer.className = "problems-table-container";

        const table = document.createElement("table");
        table.innerHTML = `
          <thead>
            <tr>
              <th class="col-pid">编号</th>
              <th class="col-title">标题</th>
              <th class="col-difficulty">难度</th>
              <th class="col-stats">通过率</th>
            </tr>
          </thead>
          <tbody>
            ${problems
              .map((p) => {
                const difficultyText = getDifficultyText(p.difficulty);
                const difficultyColor = getDifficultyColor(p.difficulty);
                const acceptedRate =
                  p.totalSubmit > 0
                    ? ((p.totalAccepted / p.totalSubmit) * 100).toFixed(1) + "%"
                    : "0.0%";

                return `
                <tr>
                  <td><span class="pid">${p.pid}</span></td>
                  <td><a href="/problem.html?pid=${p.pid}" class="title-link">${p.title}</a></td>
                  <td>
                    <div class="difficulty-tag">
                      <span class="difficulty-dot" style="background-color: ${difficultyColor}"></span>
                      <span style="color: ${difficultyColor}">${difficultyText}</span>
                    </div>
                  </td>
                  <td class="col-stats">${acceptedRate}</td>
                </tr>
              `;
              })
              .join("")}
          </tbody>
        `;

        tableContainer.appendChild(table);
        container.appendChild(tableContainer);

        // 添加分页
        const currentPage =
          parseInt(document.getElementById("pageInput").value) || 1;
        addPagination(currentPage, count, perPage);
      }

      function addPagination(currentPage, totalCount, perPage) {
        const container = document.getElementById("problemListDisplay");
        const totalPages = Math.ceil(totalCount / perPage);
        if (totalPages <= 1) return;

        const pagination = document.createElement("div");
        pagination.className = "pagination";

        // Previous
        const prevBtn = document.createElement("button");
        prevBtn.className = "page-btn";
        prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
        prevBtn.disabled = currentPage <= 1;
        prevBtn.onclick = () => {
          document.getElementById("pageInput").value = currentPage - 1;
          loadProblems();
        };
        pagination.appendChild(prevBtn);

        // Current Info
        const info = document.createElement("span");
        info.className = "current-page";
        info.textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页 (${totalCount} 题)`;
        pagination.appendChild(info);

        // Next
        const nextBtn = document.createElement("button");
        nextBtn.className = "page-btn";
        nextBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
        nextBtn.disabled = currentPage >= totalPages;
        nextBtn.onclick = () => {
          document.getElementById("pageInput").value = currentPage + 1;
          loadProblems();
        };
        pagination.appendChild(nextBtn);

        container.appendChild(pagination);
      }

      // 检查登录状态
      function checkLoginStatus() {
        const userInfoStr = localStorage.getItem("luogu_user_info");
        const userInfoDiv = document.getElementById("userInfo");
        const loginPromptDiv = document.getElementById("loginPrompt");

        if (userInfoStr) {
          try {
            const user = JSON.parse(userInfoStr);
            if (user && (user.uid || user.username)) {
              document.getElementById("userName").textContent =
                user.name || user.username;
              document.getElementById("userUid").textContent = user.uid
                ? `UID: ${user.uid}`
                : "";

              const avatarImg = document.getElementById("userAvatar");
              if (user.avatar) {
                avatarImg.src = user.avatar;
              } else if (user.uid) {
                avatarImg.src = `https://cdn.luogu.com.cn/upload/usericon/${user.uid}.png`;
              }

              userInfoDiv.classList.add("show");
              loginPromptDiv.style.display = "none";
              return;
            }
          } catch (e) {}
        }

        userInfoDiv.classList.remove("show");
        loginPromptDiv.classList.add("show");
      }

      document.addEventListener("DOMContentLoaded", () => {
        checkLoginStatus();
        loadProblems();
      });
    </script>
  </body>
</html>
