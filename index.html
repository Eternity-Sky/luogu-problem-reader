<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LGOJ - 题目浏览站</title>

      name="description"
      content="LGOJ 题目浏览站 - 洛谷题目收集与浏览平台，提供题目的静态浏览和查看功能。"
    />

      name="keywords"
      content="LGOJ, 题目浏览, 洛谷题目, 算法题库, 题目查看"
    />

    <!-- Favicon -->
    <link
      rel="icon"

      type="image/png"

    <!-- Google Fonts -->

    <!-- Font Awesome -->

    <style>
      :root {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent-color: #3b82f6;
        --accent-hover: #2563eb;
        --border-color: #334155;
        --card-bg: #1e293b;
        --shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --transition: all 0.2s ease;
        --radius: 6px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-primary);
        min-height: 100vh;
        color: var(--text-primary);
        line-height: 1.6;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 1.5rem;
      }

      /* Header Styles */
      header {
        background-color: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--border-color);
        padding: 0.75rem 0;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-primary);
        text-decoration: none;
        letter-spacing: -0.025em;
      }

      .logo i {
        margin-right: 0.5rem;
        color: var(--accent-color);
      }

      nav ul {
        display: flex;
        list-style: none;
        align-items: center;
        gap: 0.5rem;
      }

      nav ul li a {
        color: var(--text-secondary);
        text-decoration: none;
        font-weight: 500;
        transition: var(--transition);
        padding: 0.4rem 0.8rem;
        font-size: 0.875rem;
        border-radius: var(--radius);
      }

      nav ul li a:hover,
      nav ul li a.active {
        color: var(--text-primary);
        background-color: var(--bg-secondary);
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 1rem;
        border-radius: var(--radius);
        font-weight: 500;
        text-decoration: none;
        transition: var(--transition);
        font-size: 0.875rem;
        gap: 0.5rem;
        border: 1px solid transparent;
        cursor: pointer;
      }

      .btn-primary {
        background-color: var(--accent-color);
        color: white;
      }

      .btn-primary:hover {
        background-color: var(--accent-hover);
      }

      .btn-outline {
        background-color: transparent;
        border-color: var(--border-color);
        color: var(--text-primary);
      }

      .btn-outline:hover {
        background-color: var(--bg-secondary);
        border-color: var(--text-secondary);
      }

      /* User Section */
      .user-section {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.25rem 0.5rem;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
      }

      .user-avatar {
        width: 20px;
        height: 20px;
        border-radius: 2px;
      }

      .user-name {
        color: var(--text-primary);
        font-size: 0.8125rem;
        font-weight: 500;
      }

      .btn-logout {
        background: transparent;
        color: var(--text-secondary);
        border: none;
        padding: 2px 4px;
        border-radius: 4px;
        font-size: 0.75rem;
        cursor: pointer;
        transition: var(--transition);
      }

      .btn-logout:hover {
        color: #ef4444;
      }

      /* Hero Section */
      .hero {
        padding: 8rem 0 4rem;
        text-align: center;
        position: relative;
      }

      .hero-content {
        max-width: 800px;
        margin: 0 auto;
      }

      .hero h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--text-primary);
        line-height: 1;
      }

      .hero p {
        font-size: 1.125rem;
        color: var(--text-secondary);
        margin-bottom: 2.5rem;
        line-height: 1.5;
      }

      .hero-buttons {
        display: flex;
        justify-content: center;
        gap: 1rem;
      }

      /* Features Section */
      .features {
        padding: 4rem 0;
      }

      .features-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.5rem;
      }

      .feature-card {
        background: var(--card-bg);
        border-radius: var(--radius);
        padding: 2rem;
        border: 1px solid var(--border-color);
        transition: var(--transition);
      }

      .feature-card:hover {
        border-color: var(--text-secondary);
      }

      .feature-icon {
        font-size: 1.5rem;
        color: var(--accent-color);
        margin-bottom: 1.25rem;
      }

      .feature-card h3 {
        font-size: 1.125rem;
        margin-bottom: 0.75rem;
        color: var(--text-primary);
        font-weight: 600;
      }

      .feature-card p {
        color: var(--text-secondary);
        font-size: 0.9375rem;
        line-height: 1.6;
      }

      /* Footer */
      footer {
        border-top: 1px solid var(--border-color);
        padding: 4rem 0 2rem;
        margin-top: 4rem;
      }

      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 2rem;
        margin-bottom: 3rem;
      }

      .footer-column {
        flex: 1;
        min-width: 200px;
      }

      .footer-column h3 {
        color: var(--text-primary);
        font-size: 0.875rem;
        margin-bottom: 1rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .footer-column p {
        color: var(--text-secondary);
        font-size: 0.875rem;
        max-width: 300px;
      }

      .footer-links {
        list-style: none;
      }

      .footer-links li {
        margin-bottom: 0.5rem;
      }

      .footer-links a {
        color: var(--text-secondary);
        text-decoration: none;
        transition: var(--transition);
        font-size: 0.875rem;
      }

      .footer-links a:hover {
        color: var(--text-primary);
      }

      .footer-bottom {
        padding-top: 2rem;
        border-top: 1px solid var(--border-color);
        color: var(--text-secondary);
        font-size: 0.75rem;
        display: flex;
        justify-content: space-between;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        .hero h1 {
          font-size: 2.25rem;
        }

        .footer-content {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="container header-container">
        <a href="/" class="logo">
          <i class="fas fa-book"></i>
          LGOJ
        </a>
        <nav>
          <ul>
            <li><a href="/" class="active">首页</a></li>
            <li><a href="/problems.html">题库</a></li>
          </ul>
        </nav>

        <!-- 用户登录状态 -->
        <div class="user-section">
          <div id="userInfo" class="user-info" style="display: none">
            <img
              id="userAvatar"
              class="user-avatar"
              src=""
              alt="用户头像"
              onclick="goToProfile()"
              title="点击查看个人中心"
              style="cursor: pointer"
            />

            <button id="logoutBtn" class="btn-logout" onclick="logout()">

          </div>
          <div id="loginSection" class="login-section">
            <a href="/login.html" class="btn btn-primary">

        </div>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-content">
        <div class="container">
          <h1>LGOJ 题目浏览站</h1>
          <p>洛谷题目收集与浏览平台，提供题目的静态浏览和查看功能。</p>
          <div class="hero-buttons">
            <a href="/problems.html" class="btn btn-primary">
              <i class="fas fa-list"></i>
              浏览题目
            </a>
            <a href="/about" class="btn btn-outline">
              <i class="fas fa-info-circle"></i>
              了解更多
            </a>
          </div>
        </div>
      </div>
    </section>

    <!-- Features Section -->
    <section class="features">
      <div class="container">
        <div class="features-grid">
          <div class="feature-card">
            <div class="feature-icon">
              <i class="fas fa-book-open"></i>
            </div>
            <h3>题目浏览</h3>
            <p>收录洛谷平台题目，提供清晰的题目内容展示和浏览功能。</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon">
              <i class="fas fa-search"></i>
            </div>
            <h3>题目搜索</h3>
            <p>支持按题目编号和标题搜索，快速找到需要的题目。</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon">
              <i class="fas fa-code"></i>
            </div>
            <h3>代码高亮</h3>

          </div>

    </section>

    <!-- Footer -->
    <footer>
      <div class="container">
        <div class="footer-content">
          <div class="footer-column">
            <h3>LGOJ</h3>
            <p>洛谷题目收集与浏览平台，提供极简的题目查看体验。</p>
          </div>
          <div class="footer-column">
            <h3>快速链接</h3>
            <ul class="footer-links">
              <li><a href="/">首页</a></li>
              <li><a href="/problems.html">题库</a></li>
            </ul>
          </div>
        </div>
        <div class="footer-bottom">
          <p>&copy; 2025 LGOJ | 洛谷题目静态浏览平台</p>
          <p>Designed for efficiency</p>
        </div>

    <script>
      // 生成会话ID（用于在代理中识别用户会话）
      let sessionId = localStorage.getItem("luogu_session_id");
      if (!sessionId) {
        sessionId =
          "session_" +
          Date.now() +
          "_" +
          Math.random().toString(36).substr(2, 9);
        localStorage.setItem("luogu_session_id", sessionId);
      }

      // 代理函数 - 通过Netlify Functions调用洛谷API
      async function proxyLuoguAPI(path, options = {}) {
        const { method = "GET", body, headers = {} } = options;

        try {
          const response = await fetch("/.netlify/functions/luogu-proxy", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              path: path,
              method: method,
              body: body,
              headers: headers,
              sessionId: sessionId,
            }),
          });

          // 400状态码可能是正常的业务逻辑响应
          if (!response.ok && response.status !== 400) {
            throw new Error(
              `代理请求失败: ${response.status} ${response.statusText}`,
            );
          }

          return response;
        } catch (error) {
          console.error("代理请求失败:", error);
          throw error;
        }
      }

      // 检查登录状态
      async function checkLoginStatus() {
        console.log("🔍 开始检查登录状态...");

        // 首先检查localStorage中是否有用户信息
        const savedUserInfo = localStorage.getItem("luogu_user_info");
        if (savedUserInfo) {
          try {
            const userInfo = JSON.parse(savedUserInfo);
            console.log("✅ 从localStorage找到用户信息:", userInfo);

            // 检查登录时间是否过期（24小时）
            const loginTime = new Date(userInfo.loginTime);
            const now = new Date();
            const hoursDiff = (now - loginTime) / (1000 * 60 * 60);

            if (hoursDiff < 24) {
              console.log(
                `✅ 用户信息有效（${hoursDiff.toFixed(1)}小时前登录）`,
              );
              showUserInfo({
                name: userInfo.name || userInfo.username,
                uid: userInfo.uid,
                username: userInfo.username,
                avatar: userInfo.avatar,
              });
              return true;
            } else {
              console.log("⚠️ 用户信息已过期，清除localStorage");
              localStorage.removeItem("luogu_user_info");
            }
          } catch (error) {
            console.error("解析localStorage用户信息失败:", error);
            localStorage.removeItem("luogu_user_info");
          }
        }

        const sessionId = localStorage.getItem("luogu_session_id");
        if (!sessionId) {
          console.log("❌ 没有找到sessionId");
          showLoginButton();
          return false;
        }

        try {
          const response = await proxyLuoguAPI("/_lfe/config", {
            method: "GET",
          });

          console.log("登录状态检查响应状态:", response.status);
          console.log(
            "登录状态检查响应头:",
            response.headers.get("content-type"),
          );

          if (response.status === 200) {
            const data = await response.json();
            console.log("登录状态检查完整响应:", data);

            // 检查是否有currentUser字段
            if (data.currentUser && data.currentUser.name) {
              console.log("✅ 找到用户信息:", data.currentUser);
              showUserInfo(data.currentUser);
              return true;
            } else {
              console.log("❌ 响应中没有currentUser字段");
              console.log("响应数据结构:", Object.keys(data));

              // 智能检测用户字段
              const possibleUserFields = [
                "user",
                "loginUser",
                "userInfo",
                "me",
                "profile",
              ];
              console.log(
                "可能的用户字段:",
                possibleUserFields.filter((field) =>
                  data.hasOwnProperty(field),
                ),
              );

              // 查找包含用户相关信息的字段
              const userRelatedFields = Object.keys(data).filter(
                (key) =>
                  key.toLowerCase().includes("user") ||
                  key.toLowerCase().includes("login") ||
                  key.toLowerCase().includes("auth"),
              );
              console.log("用户相关的字段:", userRelatedFields);

              // 尝试找到可能的用户对象
              let foundUser = null;
              for (const field of possibleUserFields) {
                if (
                  data[field] &&
                  typeof data[field] === "object" &&
                  (data[field].name || data[field].username)
                ) {
                  console.log(`发现可能的用户字段 ${field}:`, data[field]);
                  foundUser = data[field];
                  break;
                }
              }

              if (foundUser) {
                console.log("✅ 找到用户信息:", foundUser);
                showUserInfo(foundUser);
                return true;
              } else {
                console.log("❌ 未找到用户信息，显示登录按钮");
                showLoginButton();
                return false;
              }
            }
          } else if (response.status === 302) {
            console.log("⚠️ 收到302重定向，可能需要重新登录");
            showLoginButton();
            return false;
          } else {
            console.log("❌ 登录状态检查请求失败:", response.status);
            showLoginButton();
            return false;
          }
        } catch (error) {
          console.error("检查登录状态失败:", error);
          showLoginButton();
          return false;
        }
      }

      // 显示用户信息
      function showUserInfo(user) {
        const userInfo = document.getElementById("userInfo");
        const loginSection = document.getElementById("loginSection");
        const userAvatar = document.getElementById("userAvatar");
        const userName = document.getElementById("userName");

        // 设置用户头像
        // 设置头像，优先使用真实头像，失败时回退到本地SVG
        const defaultAvatar =
          "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMjAiIGZpbGw9IiNmMGYwZjAiLz4KPHN2ZyB3aWR0aD0iMjQiIGhlaWdodD0iMjQiIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIiB4PSI4IiB5PSI4Ij4KPHN2ZyB3aWR0aD0iMjQiIGhlaWdodD0iMjQiIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTEyIDEyQzE0LjIwOTEgMTIgMTYgMTAuMjA5MSAxNiA4QzE2IDUuNzkwODYgMTQuMjA5MSA0IDEyIDRDOS43OTA4NiA0IDggNS43OTA4NiA4IDhDOCAxMC4yMDkxIDkuNzkwODYgMTIgMTIgMTJaIiBmaWxsPSIjOTk5Ii8+CjxwYXRoIGQ9Ik0xMiAxNEM5LjMzIDEzLjk5IDcgMTYuMzYgNyAxOS4wOVYyMEgxN1YxOS4wOUMxNyAxNi4zNiAxNC42NyAxMy45OSAxMiAxNFoiIGZpbGw9IiM5OTkiLz4KPC9zdmc+Cjwvc3ZnPgo8L3N2Zz4K";

        if (user.uid) {
          // 有UID，尝试加载真实头像
          userAvatar.src = `https://cdn.luogu.com.cn/upload/usericon/${user.uid}.png`;
          userAvatar.onerror = function () {
            console.log("真实头像加载失败，使用默认头像");
            this.src = defaultAvatar;
            this.onerror = null; // 防止无限循环
          };
        } else {
          // 没有UID，直接使用默认头像
          userAvatar.src = defaultAvatar;
        }

        // 设置用户名
        userName.textContent = user.name || user.username || "用户";

        // 显示用户信息，隐藏登录按钮
        userInfo.style.display = "flex";
        loginSection.style.display = "none";
      }

      // 显示登录按钮
      function showLoginButton() {
        const userInfo = document.getElementById("userInfo");
        const loginSection = document.getElementById("loginSection");

        userInfo.style.display = "none";
        loginSection.style.display = "block";
      }

      // 退出登录
      async function logout() {
        try {
          // 清除localStorage中的用户信息和会话ID
          localStorage.removeItem("luogu_user_info");
          localStorage.removeItem("luogu_session_id");
          console.log("🚪 已清除用户信息和会话ID");

          showLoginButton();

          // 可选：调用洛谷退出API
          try {
            await proxyLuoguAPI("/auth/logout", { method: "POST" });
          } catch (e) {
            // 忽略退出API错误
            console.log("退出API调用失败，但本地清理已完成");
          }

          console.log("✅ 已成功退出登录");
        } catch (error) {
          console.error("退出登录失败:", error);
        }
      }

      // 跳转到个人中心
      function goToProfile() {
        window.location.href = "/profile.html";
      }

      // 页面加载时检查登录状态
      document.addEventListener("DOMContentLoaded", function () {
        checkLoginStatus();
      });
    </script>
  </body>
</html>
