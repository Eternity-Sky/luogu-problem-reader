<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>жҙӣи°·APIжөӢиҜ• - LGOJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-900: #111827;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--gray-600);
            font-size: 1.1rem;
        }

        .test-section {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .test-section h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 1rem;
            margin-bottom: 1rem;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: var(--gray-200);
            color: var(--gray-600);
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--secondary-color);
        }

        .btn-danger {
            background: var(--danger-color);
        }

        .result-box {
            background: var(--gray-100);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .status {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            margin: 0.5rem 0;
            font-weight: 500;
        }

        .status.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .status.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .status.info {
            background: #dbeafe;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--gray-700);
        }

        .input-group input {
            width: 100%;
            max-width: 300px;
            padding: 0.5rem;
            border: 2px solid var(--gray-200);
            border-radius: 6px;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .problem-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .problem-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.2s;
        }

        .problem-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .problem-id {
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .problem-title {
            font-weight: 500;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .problem-meta {
            font-size: 0.9rem;
            color: var(--gray-600);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-code"></i> жҙӣи°·APIжөӢиҜ•</h1>
            <p>жөӢиҜ•жҙӣи°·е®ҳж–№APIзҡ„еҗ„з§ҚеҠҹиғҪ</p>
        </div>

        <!-- йўҳзӣ®еҲ—иЎЁAPIжөӢиҜ• -->
        <div class="test-section">
            <h2><i class="fas fa-list"></i> йўҳзӣ®еҲ—иЎЁAPI</h2>
            <p>жөӢиҜ• <code>GET /problem/list</code> жҺҘеҸЈ</p>
            
            <div class="input-group">
                <label for="pageInput">йЎөз Ғ (й»ҳи®Ө: 1):</label>
                <input type="number" id="pageInput" value="1" min="1">
            </div>
            
            <button class="btn" onclick="testProblemList()">
                <i class="fas fa-play"></i> иҺ·еҸ–йўҳзӣ®еҲ—иЎЁ
            </button>
            
            <div id="problemListStatus"></div>
            <div id="problemListResult" class="result-box" style="display: none;"></div>
            <div id="problemListDisplay" class="problem-list"></div>
        </div>

        <!-- еҚ•дёӘйўҳзӣ®APIжөӢиҜ• -->
        <div class="test-section">
            <h2><i class="fas fa-file-alt"></i> йўҳзӣ®иҜҰжғ…API</h2>
            <p>жөӢиҜ• <code>GET /problem/:pid</code> жҺҘеҸЈ</p>
            
            <div class="input-group">
                <label for="pidInput">йўҳзӣ®ID (еҰӮ: P1000):</label>
                <input type="text" id="pidInput" value="P1000" placeholder="P1000">
            </div>
            
            <button class="btn btn-secondary" onclick="testProblemDetail()">
                <i class="fas fa-search"></i> иҺ·еҸ–йўҳзӣ®иҜҰжғ…
            </button>
            
            <div id="problemDetailStatus"></div>
            <div id="problemDetailResult" class="result-box" style="display: none;"></div>
        </div>

        <!-- йўҳи§ЈAPIжөӢиҜ• -->
        <div class="test-section">
            <h2><i class="fas fa-lightbulb"></i> йўҳи§ЈAPI</h2>
            <p>жөӢиҜ• <code>GET /problem/solution/:pid</code> жҺҘеҸЈ</p>
            
            <div class="input-group">
                <label for="solutionPidInput">йўҳзӣ®ID (еҰӮ: P1000):</label>
                <input type="text" id="solutionPidInput" value="P1000" placeholder="P1000">
            </div>
            
            <button class="btn btn-secondary" onclick="testProblemSolution()">
                <i class="fas fa-search"></i> иҺ·еҸ–йўҳи§ЈеҲ—иЎЁ
            </button>
            
            <div id="solutionStatus"></div>
            <div id="solutionResult" class="result-box" style="display: none;"></div>
        </div>

        <!-- APIзҠ¶жҖҒжЈҖжҹҘ -->
        <div class="test-section">
            <h2><i class="fas fa-heartbeat"></i> APIзҠ¶жҖҒжЈҖжҹҘ</h2>
            <p>жЈҖжҹҘжҙӣи°·APIзҡ„еҸҜи®ҝй—®жҖ§</p>
            
            <button class="btn btn-danger" onclick="testApiStatus()">
                <i class="fas fa-check-circle"></i> жЈҖжҹҘAPIзҠ¶жҖҒ
            </button>
            
            <div id="apiStatusResult"></div>
        </div>
    </div>

    <script>
        // д»ЈзҗҶеҮҪж•° - йҖҡиҝҮNetlify Functionsи°ғз”Ёжҙӣи°·API
        async function proxyLuoguAPI(path, options = {}) {
            const requestData = {
                path: path,
                method: options.method || 'GET',
                headers: {
                    'x-luogu-type': 'content-only',
                    ...options.headers
                },
                sessionId: 'session_luogu_global_fixed_2025',
                ...options
            };

            console.log('рҹ”Қ APIиҜ·жұӮ:', requestData);

            try {
                const response = await fetch('/.netlify/functions/luogu-proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                console.log('рҹ“Ў HTTPе“Қеә”зҠ¶жҖҒ:', response.status, response.statusText);
                console.log('рҹ“Ў HTTPе“Қеә”еӨҙ:', Object.fromEntries(response.headers.entries()));

                // иҺ·еҸ–е“Қеә”ж–Үжң¬
                const responseText = await response.text();
                console.log('рҹ“„ е“Қеә”еҺҹе§Ӣж–Үжң¬ (еүҚ500еӯ—з¬Ұ):', responseText.substring(0, 500));

                // е°қиҜ•и§ЈжһҗJSON
                let result;
                try {
                    result = JSON.parse(responseText);
                    console.log('вң… JSONи§ЈжһҗжҲҗеҠҹ:', result);
                } catch (parseError) {
                    console.error('вқҢ JSONи§ЈжһҗеӨұиҙҘ:', parseError);
                    console.log('рҹ“„ е®Ңж•ҙе“Қеә”ж–Үжң¬:', responseText);
                    
                    // иҝ”еӣһеҢ…еҗ«еҺҹе§Ӣе“Қеә”зҡ„й”ҷиҜҜеҜ№иұЎ
                    return {
                        error: `JSONи§ЈжһҗеӨұиҙҘ: ${parseError.message}`,
                        rawResponse: responseText,
                        httpStatus: response.status
                    };
                }

                return result;
            } catch (error) {
                console.error('вқҢ зҪ‘з»ңиҜ·жұӮеӨұиҙҘ:', error);
                return {
                    error: `зҪ‘з»ңиҜ·жұӮеӨұиҙҘ: ${error.message}`,
                    networkError: true
                };
            }
        }

        // жҳҫзӨәзҠ¶жҖҒж¶ҲжҒҜ
        function showStatus(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        // жҳҫзӨәз»“жһң
        function showResult(elementId, data) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.textContent = JSON.stringify(data, null, 2);
        }

        // жөӢиҜ•йўҳзӣ®еҲ—иЎЁAPI
        async function testProblemList() {
            const page = document.getElementById('pageInput').value || 1;
            showStatus('problemListStatus', 'жӯЈеңЁиҺ·еҸ–йўҳзӣ®еҲ—иЎЁ...', 'info');
            
            console.log('рҹ“Ӣ ж №жҚ®APIж–ҮжЎЈи°ғз”Ёйўҳзӣ®еҲ—иЎЁAPI');
            
            try {
                // ж №жҚ®ж–ҮжЎЈпјҡDataResponseзұ»еһӢйңҖиҰҒ x-luogu-type: content-only еӨҙ
                const result = await proxyLuoguAPI(`/problem/list?page=${page}`, {
                    headers: {
                        'x-luogu-type': 'content-only'
                    }
                });
                
                if (result.error) {
                    showStatus('problemListStatus', `APIи°ғз”ЁеӨұиҙҘ: ${result.error}`, 'error');
                    showResult('problemListResult', result);
                    return;
                }

                showStatus('problemListStatus', 'йўҳзӣ®еҲ—иЎЁиҺ·еҸ–жҲҗеҠҹ!', 'success');
                showResult('problemListResult', result);
                
                // жҳҫзӨәйўҳзӣ®еҚЎзүҮ
                displayProblemCards(result);
                
            } catch (error) {
                showStatus('problemListStatus', `иҜ·жұӮеӨұиҙҘ: ${error.message}`, 'error');
                console.error('йўҳзӣ®еҲ—иЎЁAPIй”ҷиҜҜ:', error);
            }
        }

        // жҳҫзӨәйўҳзӣ®еҚЎзүҮ
        function displayProblemCards(apiResult) {
            const container = document.getElementById('problemListDisplay');
            container.innerHTML = '';
            
            console.log('рҹҺЁ ејҖе§Ӣи§Јжһҗйўҳзӣ®ж•°жҚ®:', apiResult);
            
            // е°қиҜ•д»ҺдёҚеҗҢзҡ„ж•°жҚ®з»“жһ„дёӯжҸҗеҸ–йўҳзӣ®еҲ—иЎЁ
            let problems = [];
            
            // ж–°зҡ„ж•°жҚ®з»“жһ„пјҡд»Һlentille-contextжҸҗеҸ–зҡ„ж•°жҚ®
            if (apiResult.data && apiResult.data.problems && apiResult.data.problems.result) {
                problems = apiResult.data.problems.result;
                console.log('вң… дҪҝз”Ёlentille-contextж•°жҚ®з»“жһ„пјҢйўҳзӣ®ж•°йҮҸ:', problems.length);
            }
            // еӨҮз”Ёж•°жҚ®з»“жһ„
            else if (apiResult.currentData && apiResult.currentData.problems) {
                problems = apiResult.currentData.problems;
                console.log('вң… дҪҝз”ЁcurrentDataж•°жҚ®з»“жһ„');
            } else if (apiResult.problems) {
                problems = apiResult.problems;
                console.log('вң… дҪҝз”ЁзӣҙжҺҘproblemsж•°жҚ®з»“жһ„');
            } else if (apiResult.data && apiResult.data.problems) {
                problems = apiResult.data.problems;
                console.log('вң… дҪҝз”Ёdata.problemsж•°жҚ®з»“жһ„');
            }
            
            if (!problems || problems.length === 0) {
                container.innerHTML = '<p>жңӘжүҫеҲ°йўҳзӣ®ж•°жҚ®пјҢиҜ·жҹҘзңӢеҺҹе§Ӣе“Қеә”</p>';
                console.log('вқҢ жңӘжүҫеҲ°йўҳзӣ®ж•°жҚ®');
                return;
            }
            
            console.log(`рҹҺҜ еҮҶеӨҮжҳҫзӨә ${Math.min(problems.length, 20)} дёӘйўҳзӣ®`);
            
            problems.slice(0, 20).forEach((problem, index) => {
                const card = document.createElement('div');
                card.className = 'problem-card';
                
                // иҺ·еҸ–йҡҫеәҰйўңиүІ
                const difficultyColors = ['', '#fe4c61', '#f39c11', '#e74c3c', '#9d3dcf', '#0e1d69', '#0e1d69', '#000000'];
                const difficultyColor = difficultyColors[problem.difficulty] || '#666';
                
                card.innerHTML = `
                    <div class="problem-id" style="color: ${difficultyColor}; font-weight: bold;">
                        ${problem.pid || problem.id || 'Unknown'}
                    </div>
                    <div class="problem-title">${problem.title || problem.name || 'ж— ж Үйўҳ'}</div>
                    <div class="problem-meta">
                        <span style="color: ${difficultyColor};">йҡҫеәҰ: ${problem.difficulty || 'жңӘзҹҘ'}</span> | 
                        йҖҡиҝҮ: ${problem.totalAccepted || problem.acceptedCount || 0} | 
                        жҸҗдәӨ: ${problem.totalSubmit || problem.submittedCount || 0}
                    </div>
                `;
                
                // зӮ№еҮ»и·іиҪ¬еҲ°йўҳзӣ®иҜҰжғ…
                card.style.cursor = 'pointer';
                card.onclick = () => {
                    window.open(`https://www.luogu.com.cn/problem/${problem.pid}`, '_blank');
                };
                
                container.appendChild(card);
            });
            
            // жҳҫзӨәз»ҹи®ЎдҝЎжҒҜ
            if (apiResult.data && apiResult.data.problems) {
                const stats = apiResult.data.problems;
                const statsDiv = document.createElement('div');
                statsDiv.style.marginTop = '1rem';
                statsDiv.style.padding = '1rem';
                statsDiv.style.background = '#f0f9ff';
                statsDiv.style.borderRadius = '8px';
                statsDiv.innerHTML = `
                    <strong>рҹ“Ҡ з»ҹи®ЎдҝЎжҒҜ:</strong><br>
                    жҖ»йўҳзӣ®ж•°: ${stats.count || 0} | 
                    жҜҸйЎөжҳҫзӨә: ${stats.perPage || 0} | 
                    еҪ“еүҚжҳҫзӨә: ${Math.min(problems.length, 20)} дёӘ
                `;
                container.appendChild(statsDiv);
            }
        }

        // жөӢиҜ•йўҳзӣ®иҜҰжғ…API
        async function testProblemDetail() {
            const pid = document.getElementById('pidInput').value.trim();
            if (!pid) {
                showStatus('problemDetailStatus', 'иҜ·иҫ“е…Ҙйўҳзӣ®ID', 'error');
                return;
            }
            
            showStatus('problemDetailStatus', `жӯЈеңЁиҺ·еҸ–йўҳзӣ® ${pid} зҡ„иҜҰжғ…...`, 'info');
            console.log('рҹ“Ӣ ж №жҚ®APIж–ҮжЎЈи°ғз”Ёйўҳзӣ®иҜҰжғ…API (LentilleDataResponseзұ»еһӢ)');
            
            try {
                // ж №жҚ®ж–ҮжЎЈпјҡLentilleDataResponseзұ»еһӢйңҖиҰҒ x-lentille-request: content-only еӨҙ
                const result = await proxyLuoguAPI(`/problem/${pid}`, {
                    headers: {
                        'x-lentille-request': 'content-only'
                    }
                });
                
                if (result.error) {
                    showStatus('problemDetailStatus', `APIи°ғз”ЁеӨұиҙҘ: ${result.error}`, 'error');
                    showResult('problemDetailResult', result);
                    return;
                }

                showStatus('problemDetailStatus', `йўҳзӣ® ${pid} иҜҰжғ…иҺ·еҸ–жҲҗеҠҹ!`, 'success');
                showResult('problemDetailResult', result);
                
            } catch (error) {
                showStatus('problemDetailStatus', `иҜ·жұӮеӨұиҙҘ: ${error.message}`, 'error');
                console.error('йўҳзӣ®иҜҰжғ…APIй”ҷиҜҜ:', error);
            }
        }

        // жөӢиҜ•йўҳи§ЈAPI
        async function testProblemSolution() {
            const pid = document.getElementById('solutionPidInput').value.trim();
            if (!pid) {
                showStatus('solutionStatus', 'иҜ·иҫ“е…Ҙйўҳзӣ®ID', 'error');
                return;
            }
            
            showStatus('solutionStatus', `жӯЈеңЁиҺ·еҸ–йўҳзӣ® ${pid} зҡ„йўҳи§Ј...`, 'info');
            console.log('рҹ“Ӣ ж №жҚ®APIж–ҮжЎЈи°ғз”Ёйўҳи§ЈAPI (LentilleDataResponseзұ»еһӢ)');
            
            try {
                // ж №жҚ®ж–ҮжЎЈпјҡLentilleDataResponseзұ»еһӢйңҖиҰҒ x-lentille-request: content-only еӨҙ
                const result = await proxyLuoguAPI(`/problem/solution/${pid}`, {
                    headers: {
                        'x-lentille-request': 'content-only'
                    }
                });
                
                if (result.error) {
                    showStatus('solutionStatus', `APIи°ғз”ЁеӨұиҙҘ: ${result.error}`, 'error');
                    showResult('solutionResult', result);
                    return;
                }

                showStatus('solutionStatus', `йўҳзӣ® ${pid} йўҳи§ЈиҺ·еҸ–жҲҗеҠҹ!`, 'success');
                showResult('solutionResult', result);
                
            } catch (error) {
                showStatus('solutionStatus', `иҜ·жұӮеӨұиҙҘ: ${error.message}`, 'error');
                console.error('йўҳи§ЈAPIй”ҷиҜҜ:', error);
            }
        }

        // жөӢиҜ•APIзҠ¶жҖҒ
        async function testApiStatus() {
            const statusElement = document.getElementById('apiStatusResult');
            statusElement.innerHTML = '<div class="status info">жӯЈеңЁжЈҖжҹҘAPIзҠ¶жҖҒ...</div>';
            
            console.log('рҹ“Ӣ ж №жҚ®APIж–ҮжЎЈжЈҖжҹҘеҗ„зұ»APIзҠ¶жҖҒ');
            
            const tests = [
                { 
                    name: 'йўҳзӣ®еҲ—иЎЁAPI (DataResponse)', 
                    path: '/problem/list?page=1',
                    headers: { 'x-luogu-type': 'content-only' }
                },
                { 
                    name: 'йўҳзӣ®иҜҰжғ…API (LentilleDataResponse)', 
                    path: '/problem/P1000',
                    headers: { 'x-lentille-request': 'content-only' }
                },
                { 
                    name: 'йўҳи§ЈAPI (LentilleDataResponse)', 
                    path: '/problem/solution/P1000',
                    headers: { 'x-lentille-request': 'content-only' }
                }
            ];
            
            let results = [];
            
            for (const test of tests) {
                try {
                    console.log(`рҹ”Қ жөӢиҜ• ${test.name}:`, test.path);
                    const result = await proxyLuoguAPI(test.path, { headers: test.headers });
                    const status = result.error ? 'error' : 'success';
                    const message = result.error ? result.error : 'жӯЈеёё';
                    results.push(`<div class="status ${status}">${test.name}: ${message}</div>`);
                } catch (error) {
                    results.push(`<div class="status error">${test.name}: ${error.message}</div>`);
                }
            }
            
            statusElement.innerHTML = results.join('');
        }
