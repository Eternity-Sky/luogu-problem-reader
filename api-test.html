<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛谷API测试 - LGOJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-900: #111827;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--gray-600);
            font-size: 1.1rem;
        }

        .test-section {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .test-section h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 1rem;
            margin-bottom: 1rem;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: var(--gray-200);
            color: var(--gray-600);
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--secondary-color);
        }

        .btn-danger {
            background: var(--danger-color);
        }

        .result-box {
            background: var(--gray-100);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .status {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            margin: 0.5rem 0;
            font-weight: 500;
        }

        .status.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .status.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .status.info {
            background: #dbeafe;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--gray-700);
        }

        .input-group input {
            width: 100%;
            max-width: 300px;
            padding: 0.5rem;
            border: 2px solid var(--gray-200);
            border-radius: 6px;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .problem-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .problem-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.2s;
        }

        .problem-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .problem-id {
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .problem-title {
            font-weight: 500;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .problem-meta {
            font-size: 0.9rem;
            color: var(--gray-600);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-code"></i> 洛谷API测试</h1>
            <p>测试洛谷官方API的各种功能</p>
        </div>

        <!-- 题目列表API测试 -->
        <div class="test-section">
            <h2><i class="fas fa-list"></i> 题目列表API</h2>
            <p>测试 <code>GET /problem/list</code> 接口</p>
            
            <div class="input-group">
                <label for="pageInput">页码 (默认: 1):</label>
                <input type="number" id="pageInput" value="1" min="1">
            </div>
            
            <button class="btn" onclick="testProblemList()">
                <i class="fas fa-play"></i> 获取题目列表
            </button>
            
            <div id="problemListStatus"></div>
            <div id="problemListResult" class="result-box" style="display: none;"></div>
            <div id="problemListDisplay" class="problem-list"></div>
        </div>

        <!-- 单个题目API测试 -->
        <div class="test-section">
            <h2><i class="fas fa-file-alt"></i> 题目详情API</h2>
            <p>测试 <code>GET /problem/:pid</code> 接口</p>
            
            <div class="input-group">
                <label for="pidInput">题目ID (如: P1000):</label>
                <input type="text" id="pidInput" value="P1000" placeholder="P1000">
            </div>
            
            <button class="btn btn-secondary" onclick="testProblemDetail()">
                <i class="fas fa-search"></i> 获取题目详情
            </button>
            
            <div id="problemDetailStatus"></div>
            <div id="problemDetailResult" class="result-box" style="display: none;"></div>
        </div>

        <!-- 题解API测试 -->
        <div class="test-section">
            <h2><i class="fas fa-lightbulb"></i> 题解API</h2>
            <p>测试 <code>GET /problem/solution/:pid</code> 接口</p>
            
            <div class="input-group">
                <label for="solutionPidInput">题目ID (如: P1000):</label>
                <input type="text" id="solutionPidInput" value="P1000" placeholder="P1000">
            </div>
            
            <button class="btn btn-secondary" onclick="testProblemSolution()">
                <i class="fas fa-search"></i> 获取题解列表
            </button>
            
            <div id="solutionStatus"></div>
            <div id="solutionResult" class="result-box" style="display: none;"></div>
        </div>

        <!-- API状态检查 -->
        <div class="test-section">
            <h2><i class="fas fa-heartbeat"></i> API状态检查</h2>
            <p>检查洛谷API的可访问性</p>
            
            <button class="btn btn-danger" onclick="testApiStatus()">
                <i class="fas fa-check-circle"></i> 检查API状态
            </button>
            
            <div id="apiStatusResult"></div>
        </div>
    </div>

    <script>
        // 代理函数 - 通过Netlify Functions调用洛谷API
        async function proxyLuoguAPI(path, options = {}) {
            const requestData = {
                path: path,
                method: options.method || 'GET',
                headers: {
                    'x-luogu-type': 'content-only',
                    ...options.headers
                },
                sessionId: 'session_luogu_global_fixed_2025',
                ...options
            };

            console.log('🔍 API请求:', requestData);

            try {
                const response = await fetch('/.netlify/functions/luogu-proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();
                console.log('📦 API响应:', result);
                return result;
            } catch (error) {
                console.error('❌ API调用失败:', error);
                throw error;
            }
        }

        // 显示状态消息
        function showStatus(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        // 显示结果
        function showResult(elementId, data) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.textContent = JSON.stringify(data, null, 2);
        }

        // 测试题目列表API
        async function testProblemList() {
            const page = document.getElementById('pageInput').value || 1;
            showStatus('problemListStatus', '正在获取题目列表...', 'info');
            
            try {
                const result = await proxyLuoguAPI(`/problem/list?page=${page}&_contentOnly=1`);
                
                if (result.error) {
                    showStatus('problemListStatus', `API调用失败: ${result.error}`, 'error');
                    showResult('problemListResult', result);
                    return;
                }

                showStatus('problemListStatus', '题目列表获取成功!', 'success');
                showResult('problemListResult', result);
                
                // 显示题目卡片
                displayProblemCards(result);
                
            } catch (error) {
                showStatus('problemListStatus', `请求失败: ${error.message}`, 'error');
                console.error('题目列表API错误:', error);
            }
        }

        // 显示题目卡片
        function displayProblemCards(apiResult) {
            const container = document.getElementById('problemListDisplay');
            container.innerHTML = '';
            
            // 尝试从不同的数据结构中提取题目列表
            let problems = [];
            
            if (apiResult.currentData && apiResult.currentData.problems) {
                problems = apiResult.currentData.problems;
            } else if (apiResult.problems) {
                problems = apiResult.problems;
            } else if (apiResult.data && apiResult.data.problems) {
                problems = apiResult.data.problems;
            }
            
            if (problems.length === 0) {
                container.innerHTML = '<p>未找到题目数据，请查看原始响应</p>';
                return;
            }
            
            problems.slice(0, 20).forEach(problem => {
                const card = document.createElement('div');
                card.className = 'problem-card';
                card.innerHTML = `
                    <div class="problem-id">${problem.pid || problem.id || 'Unknown'}</div>
                    <div class="problem-title">${problem.title || problem.name || '无标题'}</div>
                    <div class="problem-meta">
                        难度: ${problem.difficulty || '未知'} | 
                        通过: ${problem.acceptedCount || 0} | 
                        提交: ${problem.submittedCount || 0}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 测试题目详情API
        async function testProblemDetail() {
            const pid = document.getElementById('pidInput').value.trim();
            if (!pid) {
                showStatus('problemDetailStatus', '请输入题目ID', 'error');
                return;
            }
            
            showStatus('problemDetailStatus', `正在获取题目 ${pid} 的详情...`, 'info');
            
            try {
                const result = await proxyLuoguAPI(`/problem/${pid}?_contentOnly=1`);
                
                if (result.error) {
                    showStatus('problemDetailStatus', `API调用失败: ${result.error}`, 'error');
                    showResult('problemDetailResult', result);
                    return;
                }

                showStatus('problemDetailStatus', `题目 ${pid} 详情获取成功!`, 'success');
                showResult('problemDetailResult', result);
                
            } catch (error) {
                showStatus('problemDetailStatus', `请求失败: ${error.message}`, 'error');
                console.error('题目详情API错误:', error);
            }
        }

        // 测试题解API
        async function testProblemSolution() {
            const pid = document.getElementById('solutionPidInput').value.trim();
            if (!pid) {
                showStatus('solutionStatus', '请输入题目ID', 'error');
                return;
            }
            
            showStatus('solutionStatus', `正在获取题目 ${pid} 的题解...`, 'info');
            
            try {
                const result = await proxyLuoguAPI(`/problem/solution/${pid}?_contentOnly=1`);
                
                if (result.error) {
                    showStatus('solutionStatus', `API调用失败: ${result.error}`, 'error');
                    showResult('solutionResult', result);
                    return;
                }

                showStatus('solutionStatus', `题目 ${pid} 题解获取成功!`, 'success');
                showResult('solutionResult', result);
                
            } catch (error) {
                showStatus('solutionStatus', `请求失败: ${error.message}`, 'error');
                console.error('题解API错误:', error);
            }
        }

        // 测试API状态
        async function testApiStatus() {
            const statusElement = document.getElementById('apiStatusResult');
            statusElement.innerHTML = '<div class="status info">正在检查API状态...</div>';
            
            const tests = [
                { name: '题目列表API', path: '/problem/list?page=1&_contentOnly=1' },
                { name: '题目详情API', path: '/problem/P1000?_contentOnly=1' },
                { name: '题解API', path: '/problem/solution/P1000?_contentOnly=1' }
            ];
            
            let results = [];
            
            for (const test of tests) {
                try {
                    const result = await proxyLuoguAPI(test.path);
                    const status = result.error ? 'error' : 'success';
                    const message = result.error ? result.error : '正常';
                    results.push(`<div class="status ${status}">${test.name}: ${message}</div>`);
                } catch (error) {
                    results.push(`<div class="status error">${test.name}: ${error.message}</div>`);
                }
            }
            
            statusElement.innerHTML = results.join('');
        }

        // 页面加载时的初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('洛谷API测试页面已加载');
        });
    </script>
</body>
</html>
