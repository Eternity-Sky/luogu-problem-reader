<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>提交调试工具 - LGOJ</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #f8fafc;
        padding: 2rem;
        line-height: 1.5;
      }
      .card {
        background: #1e293b;
        padding: 1.5rem;
        border-radius: 8px;
        border: 1px solid #334155;
        max-width: 800px;
        margin: 0 auto;
      }
      h2 {
        margin-top: 0;
        color: #3b82f6;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        display: block;
        font-size: 0.875rem;
        font-weight: bold;
        margin-bottom: 0.5rem;
        color: #94a3b8;
      }
      input,
      textarea,
      select {
        width: 100%;
        background: #0f172a;
        border: 1px solid #334155;
        color: white;
        padding: 0.5rem;
        border-radius: 4px;
        box-sizing: border-box;
      }
      textarea {
        font-family: monospace;
        min-height: 200px;
      }
      .btn {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      .btn:hover {
        background: #2563eb;
      }
      #log {
        margin-top: 1.5rem;
        background: #000;
        padding: 1rem;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.875rem;
        height: 300px;
        overflow-y: auto;
        white-space: pre-wrap;
        border: 1px solid #334155;
      }
      .status-tag {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        margin-left: 0.5rem;
      }
      .success {
        background: #065f46;
        color: #34d399;
      }
      .error {
        background: #7f1d1d;
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>🚀 提交调试工具</h2>
      <p style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 1.5rem">
        直接注入核心 Cookie 并绕过阻塞验证进行提交测试。
      </p>

      <div class="form-group">
        <label>核心 Cookie 注入 (格式: key1=val1; key2=val2)</label>
        <input
          type="text"
          id="cookieInput"
          placeholder="_uid=1967459; __client_id=...; C3VK=6ec152"
          value="_uid=1967459; __client_id=53c42c2472b62bfb69abff17aa068305; C3VK=6ec152"
        />
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
        <div class="form-group">
          <label>题目 ID</label>
          <input type="text" id="pid" value="P1001" />
        </div>
        <div class="form-group">
          <label>编程语言</label>
          <select id="lang">
            <option value="12">C++14 (GCC 9)</option>
            <option value="28">Python 3</option>
            <option value="3">Java 8</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>源代码</label>
        <textarea id="code">
#include <iostream>
using namespace std;
int main() {
    int a, b;
    cin >> a >> b;
    cout << a + b << endl;
    return 0;
}</textarea
        >
      </div>

      <button class="btn" onclick="runDebugSubmit()">开始调试提交</button>

      <div id="log">等待操作...</div>
    </div>

    <script>
      function log(msg, type = "") {
        const logEl = document.getElementById("log");
        const time = new Date().toLocaleTimeString();
        const tag = type
          ? `<span class="status-tag ${type}">${type.toUpperCase()}</span>`
          : "";
        logEl.innerHTML += `[${time}] ${msg}${tag}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      async function proxyRequest(path, options = {}) {
        const cookieStr = document.getElementById("cookieInput").value;
        const backupCookies = btoa(unescape(encodeURIComponent(cookieStr)));
        const uid = cookieStr.match(/_uid=(\d+)/)?.[1] || "debug";

        const payload = {
          path: path,
          method: options.method || "GET",
          sessionId: `session_uid_${uid}`,
          backupCookies: backupCookies,
          headers: {
            "User-Agent": navigator.userAgent,
            ...options.headers,
          },
          body: options.body,
          requestType: options.requestType || "api",
        };

        // 🎯 修复：动态识别环境，如果在本地 file:// 运行，尝试指向生产环境或本地 dev 端口
        let proxyUrl = "/.netlify/functions/luogu-proxy";
        if (window.location.protocol === "file:") {
          // 如果是本地直接打开，尝试指向生产环境地址（或您本地的 netlify dev 地址）
          proxyUrl = "https://melg.netlify.app/.netlify/functions/luogu-proxy";
          log("🌐 检测到 file 协议，自动切换到生产环境代理：" + proxyUrl);
        }

        try {
          const resp = await fetch(proxyUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (!resp.ok) {
            throw new Error(`HTTP 错误: ${resp.status}`);
          }

          const result = await resp.json();
          if (result._backupCookies) {
            localStorage.setItem("luogu_backup_cookies", result._backupCookies);
            log("🔄 代理返回了更新后的 Cookie 备份");
          }
          return result;
        } catch (err) {
          log(`❌ 网络请求失败: ${err.message}`, "error");
          throw err;
        }
      }

      async function runDebugSubmit() {
        document.getElementById("log").innerHTML = "";
        const pid = document.getElementById("pid").value;
        const code = document.getElementById("code").value;
        const lang = document.getElementById("lang").value;

        log(`开始测试题目 ${pid}...`);

        // 1. 预检身份
        log("步骤 1: 正在尝试获取当前身份信息...");
        const config = await proxyRequest("/_lfe/config");
        if (config.currentUser && config.currentUser.uid !== 0) {
          log(
            `✅ 识别到用户: ${config.currentUser.name} (UID: ${config.currentUser.uid})`,
            "success",
          );
        } else {
          log("⚠️ 洛谷未识别身份，将尝试使用注入的 Cookie 强制提交", "error");
        }

        // 2. 获取题目页 CSRF
        log(`步骤 2: 正在从题目页 /problem/${pid} 获取 CSRF Token...`);
        const probHtmlResp = await proxyRequest(`/problem/${pid}`, {
          requestType: "html",
        });
        const html = probHtmlResp.data || "";

        // 使用更健壮的 CSRF 提取正则，支持多种属性顺序
        const csrfMatch =
          html.match(
            /<meta[^>]*name=["']csrf-token["'][^>]*content=["']([^"']+)["'][^>]*>/i,
          ) ||
          html.match(
            /<meta[^>]*content=["']([^"']+)["'][^>]*name=["']csrf-token["'][^>]*>/i,
          );

        const csrfToken = csrfMatch ? csrfMatch[1] : null;

        if (csrfToken) {
          log(
            `✅ 成功获取 CSRF Token: ${csrfToken.substring(0, 10)}...`,
            "success",
          );
        } else {
          log("❌ 无法从页面提取 CSRF Token，提交可能会失败", "error");
        }

        // 3. 发起提交
        log("步骤 3: 正在发起最终提交请求...");
        const submitResp = await proxyRequest(`/fe/api/problem/submit/${pid}`, {
          method: "POST",
          headers: { "x-csrf-token": csrfToken },
          body: {
            lang: parseInt(lang),
            code: code,
            enableO2: 1,
          },
        });

        if (submitResp.rid) {
          log(`🎉 提交成功! 评测 ID (RID): ${submitResp.rid}`, "success");
          log(`查看结果: https://www.luogu.com.cn/record/${submitResp.rid}`);
        } else {
          log(
            `❌ 提交失败: ${submitResp.errorMessage || submitResp.error || "未知错误"}`,
            "error",
          );
          console.log("完整响应:", submitResp);
        }
      }
    </script>
  </body>
</html>
