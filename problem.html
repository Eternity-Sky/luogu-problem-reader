<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题目详情 - LGOJ 题目浏览站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Markdown渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- KaTeX数学公式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #10b981;
            --accent-color: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: white;
            min-height: 100vh;
            color: var(--gray-800);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gray-200);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--gray-700);
            transform: translateY(-2px);
        }

        /* Main Content */
        .main {
            padding: 2rem 0;
        }

        .problem-container {
            background: white;
            padding: 2rem 0;
            margin-bottom: 0;
        }

        .problem-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem;
        }

        .problem-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .problem-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .meta-label {
            font-weight: 500;
            opacity: 0.9;
        }

        .meta-value {
            font-weight: 600;
        }

        .difficulty-tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            color: white;
        }

        .difficulty-1 { background: linear-gradient(135deg, #10b981, #059669); }
        .difficulty-2 { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .difficulty-3 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .difficulty-4 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .difficulty-5 { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .difficulty-6 { background: linear-gradient(135deg, #991b1b, #7f1d1d); }
        .difficulty-7 { background: linear-gradient(135deg, #000000, #374151); }

        .problem-content {
            padding: 2rem;
        }

        .section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--gray-200);
        }

        .problem-description {
            line-height: 1.7;
            color: var(--gray-700);
        }

        .problem-description h3 {
            color: var(--gray-800);
            margin: 1.5rem 0 1rem 0;
            font-size: 1.1rem;
        }

        .problem-description p {
            margin-bottom: 1rem;
        }

        .problem-description pre {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 0;
            overflow: hidden;
            margin: 1rem 0;
            font-family: 'Courier New', monospace;
            position: relative;
        }

        .code-block {
            position: relative;
            background: var(--gray-50);
            border-radius: 8px;
            overflow: hidden;
        }

        .code-header {
            background: var(--gray-100);
            border-bottom: 1px solid var(--gray-200);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            color: var(--gray-600);
        }

        .code-language {
            font-weight: 500;
        }

        .copy-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .copy-btn:hover {
            background: var(--gray-700);
        }

        .copy-btn.copied {
            background: var(--secondary-color);
        }

        .code-content {
            padding: 1rem;
            overflow-x: auto;
            background: var(--gray-50);
        }

        .problem-description code {
            background: var(--gray-100);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        /* 行内代码不应用代码块样式 */
        .problem-description p code,
        .problem-description li code {
            background: var(--gray-100);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        /* 图片响应式样式 */
        .problem-description img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin: 1rem 0;
            display: block;
        }

        /* 大图片居中显示 */
        .problem-description img[width], 
        .problem-description img[style*="width"] {
            max-width: 100% !important;
            width: auto !important;
            height: auto !important;
        }

        /* 图片容器 */
        .problem-description p:has(img) {
            text-align: center;
        }

        /* 确保所有媒体元素都响应式 */
        .problem-description video,
        .problem-description iframe,
        .problem-description embed,
        .problem-description object {
            max-width: 100%;
            height: auto;
        }

        /* KaTeX数学公式样式 */
        .katex {
            font-size: 1.1em;
        }

        .katex-display {
            margin: 1rem 0;
            text-align: center;
        }

        /* Markdown渲染样式 */
        .problem-description h1,
        .problem-description h2,
        .problem-description h3,
        .problem-description h4 {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .problem-description ul,
        .problem-description ol {
            margin: 1rem 0;
            padding-left: 2rem;
        }

        .problem-description li {
            margin: 0.5rem 0;
        }

        .problem-description blockquote {
            border-left: 4px solid var(--primary-color);
            margin: 1rem 0;
            padding: 1rem;
            background: var(--gray-50);
            border-radius: 0 8px 8px 0;
        }

        .problem-description table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .problem-description th,
        .problem-description td {
            border: 1px solid var(--gray-300);
            padding: 0.75rem;
            text-align: left;
        }

        .problem-description th {
            background: var(--gray-100);
            font-weight: 600;
        }

        /* 代码提交区域样式 */
        .submit-section {
            background: white;
            padding: 2rem 0;
            margin-top: 2rem;
            border-top: 1px solid var(--gray-200);
        }

        .submit-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .submit-form {
            max-width: 800px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--gray-700);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .code-editor {
            width: 100%;
            min-height: 300px;
            padding: 1rem;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            font-family: 'JetBrains Mono', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            transition: border-color 0.2s;
        }

        .code-editor:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .submit-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-submit {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background: var(--gray-700);
        }

        .btn-submit:disabled {
            background: var(--gray-400);
            cursor: not-allowed;
        }

        .submit-status {
            font-size: 0.875rem;
            padding: 0.5rem 0;
        }

        .submit-status.success {
            color: var(--success-color);
        }

        .submit-status.error {
            color: var(--error-color);
        }

        .submit-status.loading {
            color: var(--primary-color);
        }

        /* 评论区域样式 */
        .comments-section {
            background: white;
            padding: 2rem 0;
            margin-top: 2rem;
            border-top: 1px solid var(--gray-200);
        }

        .comments-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--gray-600);
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 1rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .status {
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .status.info {
            background: #dbeafe;
            border: 1px solid #93c5fd;
            color: #1d4ed8;
        }

        .status.success {
            background: #d1fae5;
            border: 1px solid #86efac;
            color: #059669;
        }

        .status.error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }

        /* 用户信息样式 */
        .user-info {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: none;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .user-info.show {
            display: flex;
            align-items: center;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin-right: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .user-uid {
            opacity: 0.8;
            font-size: 0.875rem;
        }

        .login-prompt {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
        }

        .login-prompt.show {
            display: block;
        }

        .login-btn {
            background: var(--primary-color);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            margin-top: 0.5rem;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background: var(--gray-700);
            color: white;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .problem-title {
                font-size: 1.5rem;
            }
            
            .problem-meta {
                grid-template-columns: 1fr;
            }
            
            .header-container {
                flex-direction: column;
                gap: 1rem;
            }
            
            .user-info {
                padding: 0.75rem;
            }
            
            .user-avatar {
                width: 40px;
                height: 40px;
            }
            
            /* 移动端图片优化 */
            .problem-description img {
                margin: 0.5rem auto;
                max-width: calc(100vw - 2rem);
                border-radius: 6px;
            }
            
            /* 移动端代码块优化 */
            .code-content {
                padding: 0.75rem;
                font-size: 0.875rem;
            }
            
            .code-header {
                padding: 0.375rem 0.75rem;
                font-size: 0.8rem;
            }
            
            /* 移动端容器优化 */
            .container {
                padding: 0 1rem;
            }
            
            .problem-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-container">
            <a href="/" class="logo">
                <i class="fas fa-book"></i>
                LGOJ
            </a>
            <a href="/problems.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                返回题目列表
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- 用户信息显示 -->
            <div id="userInfo" class="user-info">
                <img id="userAvatar" class="user-avatar" src="" alt="用户头像">
                <div class="user-details">
                    <div id="userName" class="user-name"></div>
                    <div id="userUid" class="user-uid"></div>
                </div>
            </div>

            <!-- 登录提示 -->
            <div id="loginPrompt" class="login-prompt">
                <div>
                    <i class="fas fa-user-circle" style="font-size: 2rem; color: var(--gray-400); margin-bottom: 0.5rem;"></i>
                    <p style="margin: 0.5rem 0; color: var(--gray-600);">登录后可以提交代码、查看提交记录等更多功能</p>
                    <a href="/login.html" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        立即登录
                    </a>
                </div>
            </div>
            
            <div id="loadingStatus" class="loading">
                <i class="fas fa-spinner"></i>
                <div>正在加载题目详情...</div>
            </div>
            
            <div id="problemContainer" class="problem-container" style="display: none;">
                <!-- 题目内容将在这里动态加载 -->
            </div>
            
            <!-- 代码提交区域 -->
            <div id="submitSection" class="submit-section" style="display: none;">
                <h3><i class="fas fa-code"></i> 代码提交</h3>
                
                <!-- 强硬措施：手动Cookie输入 -->
                <div class="emergency-login" style="background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 5px; padding: 10px; margin-bottom: 15px; display: none;" id="emergencyLogin">
                    <h4 style="color: #856404; margin: 0 0 10px 0;"><i class="fas fa-exclamation-triangle"></i> 强硬措施：手动Cookie</h4>
                    <p style="margin: 0 0 10px 0; color: #856404; font-size: 14px;">请从浏览器开发者工具中复制完整的Cookie：</p>
                    <textarea id="manualCookie" placeholder="_uid=1234567; __client_id=abc123def456..." 
                              style="width: 100%; height: 60px; font-family: monospace; font-size: 12px; margin-bottom: 10px;"></textarea>
                    <button onclick="saveManualCookie()" class="btn btn-warning btn-sm">
                        <i class="fas fa-save"></i> 保存并测试
                    </button>
                    <button onclick="autoGetCookie()" class="btn btn-success btn-sm" style="margin-left: 10px;">
                        <i class="fas fa-magic"></i> 自动获取
                    </button>
                    <button onclick="directSubmit()" class="btn btn-danger btn-sm" style="margin-left: 10px;">
                        <i class="fas fa-rocket"></i> 直接提交
                    </button>
                </div>
                
                <div class="form-group">
                    <label for="languageSelect">编程语言:</label>
                    <select id="languageSelect" class="form-control">
                        <option value="0">C++14 (GCC 9)</option>
                        <option value="1">C++17 (GCC 9)</option>
                        <option value="2">C++20 (GCC 13)</option>
                        <option value="3">C (GCC 9)</option>
                        <option value="7">Python 3</option>
                        <option value="8">Java 8</option>
                        <option value="16">Node.js 12.18.4</option>
                        <option value="11">PyPy 3</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="codeEditor">代码:</label>
                    <textarea id="codeEditor" class="code-editor" placeholder="请输入您的代码..."></textarea>
                </div>
                
                <div class="submit-actions">
                    <button id="submitBtn" class="btn-submit" onclick="submitCode()">
                        <i class="fas fa-paper-plane"></i>
                        提交代码
                    </button>
                    <button onclick="showEmergencyLogin()" class="btn btn-warning" style="margin-left: 10px;">
                        <i class="fas fa-tools"></i> 强硬措施
                    </button>
                    <div id="submitStatus" class="submit-status"></div>
                </div>
            </div>
            
            <!-- 评论区域 -->
            <div id="commentsSection" class="comments-section" style="display: none;">
                <div class="comments-title">
                    <i class="fas fa-comments"></i>
                    讨论区
                </div>
                <script src="https://giscus.app/client.js"
                        data-repo="Eternity-Sky/luogu-problem-reader"
                        data-repo-id="R_kgDOPiP5uw"
                        data-category="Announcements"
                        data-category-id="DIC_kwDOPiP5u84CugHo"
                        data-mapping="url"
                        data-strict="0"
                        data-reactions-enabled="1"
                        data-emit-metadata="0"
                        data-input-position="bottom"
                        data-theme="light"
                        data-lang="zh-CN"
                        crossorigin="anonymous"
                        async>
                </script>
            </div>
        </div>
    </main>

    <script>
        // 获取难度文本
        function getDifficultyText(difficulty) {
            const texts = {
                0: '暂无评定',
                1: '入门',
                2: '普及-',
                3: '普及/提高-',
                4: '普及+/提高',
                5: '提高+/省选-',
                6: '省选/NOI-',
                7: 'NOI/NOI+/CTSC'
            };
            return texts[difficulty] || '未知';
        }

        // 代理函数 - 通过Netlify Functions调用洛谷API
        async function proxyLuoguAPI(path, options = {}) {
            const requestData = {
                path: path,
                method: options.method || 'GET',
                headers: {
                    'x-lentille-request': 'content-only',
                    ...options.headers
                },
                sessionId: 'session_luogu_global_fixed_2025',
                ...options
            };

            console.log('🔍 API请求:', requestData);

            try {
                const response = await fetch('/.netlify/functions/luogu-proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                console.log('📡 HTTP响应状态:', response.status, response.statusText);

                const responseText = await response.text();
                console.log('📄 响应原始文本 (前500字符):', responseText.substring(0, 500));

                let result;
                try {
                    result = JSON.parse(responseText);
                    console.log('✅ JSON解析成功:', result);
                } catch (parseError) {
                    console.error('❌ JSON解析失败:', parseError);
                    return {
                        error: `JSON解析失败: ${parseError.message}`,
                        rawResponse: responseText,
                        httpStatus: response.status
                    };
                }

                return result;
            } catch (error) {

        // 格式化内容，处理Markdown和KaTeX数学公式
        function formatContent(content) {
            if (!content) return '';
            
            try {
                // 配置marked选项
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    sanitize: false,
                    highlight: function(code, lang) {
                        return code; // 简单的代码高亮，可以后续扩展
                    }
                });
                
                // 使用marked渲染Markdown
                let html = marked.parse(content);
                
                // 处理代码块，添加复制功能
                html = html.replace(/<pre><code(?:\s+class="language-(\w+)")?>([\s\S]*?)<\/code><\/pre>/g, function(match, lang, code) {
                    const language = lang || 'text';
                    const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
                    
                    return `
                        <div class="code-block">
                            <div class="code-header">
                                <span class="code-language">${language}</span>
                                <button class="copy-btn" onclick="copyCode('${codeId}')">
                                    <i class="fas fa-copy"></i>
                                    复制
                                </button>
                            </div>
                            <div class="code-content">
                                <pre id="${codeId}"><code>${code}</code></pre>
                            </div>
                        </div>
                    `;
                });
                
                return html;
            } catch (error) {
                console.warn('Markdown渲染失败，使用简单格式化:', error);
                
                // 降级处理：简单的文本格式化
                content = content.replace(/\n/g, '<br>');
                content = content.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
                
                // 处理代码块并添加复制功能
                content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
                    const language = lang || 'text';
                    const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
                    
                    return `
                        <div class="code-block">
                            <div class="code-header">
                                <span class="code-language">${language}</span>
                                <button class="copy-btn" onclick="copyCode('${codeId}')">
                                    <i class="fas fa-copy"></i>
                                    复制
                                </button>
                            </div>
                            <div class="code-content">
                                <pre id="${codeId}"><code>${code}</code></pre>
                            </div>
                        </div>
                    `;
                });
                
                content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                
                return content;
            }
        }

        // 渲染KaTeX数学公式
        function renderMath(element) {
            if (typeof renderMathInElement !== 'undefined') {
                try {
                    console.log('🔢 开始渲染KaTeX数学公式');
                    renderMathInElement(element, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false,
                        errorColor: '#cc0000',
                        strict: false,
                        trust: true,
                        macros: {
                            "\\def": "\\gdef",
                            "\\arraystretch": "\\def\\arraystretch{#1}",

                            "\\mathclap": "\\mathrlap{\\phantom{#1}}\\mathllap{#1}",

                        }
                    });

        // 复制代码功能
        function copyCode(codeId) {
            const codeElement = document.getElementById(codeId);
            const button = codeElement.closest('.code-block').querySelector('.copy-btn');
            
            if (!codeElement) {
                console.error('代码元素未找到:', codeId);
                return;
            }

            const codeText = codeElement.textContent || codeElement.innerText;
            
            // 使用现代 Clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(codeText).then(() => {
                    showCopySuccess(button);
                }).catch(err => {
                    console.error('复制失败:', err);
                    fallbackCopyTextToClipboard(codeText, button);
                });
            } else {
                // 降级方案
                fallbackCopyTextToClipboard(codeText, button);
            }
        }

        // 降级复制方案
        function fallbackCopyTextToClipboard(text, button) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            
            // 避免滚动到底部
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showCopySuccess(button);
                } else {
                    showCopyError(button);
                }
            } catch (err) {
                console.error('降级复制失败:', err);
                showCopyError(button);
            }
            
            document.body.removeChild(textArea);
        }

        // 代理API调用函数（复用登录页面的逻辑）
        async function proxyLuoguAPI(path, options = {}) {
            try {
                const requestData = {
                    path: path,
                    method: options.method || 'GET',
                    headers: {
                        'x-luogu-type': 'content-only',
                        ...options.headers
                    },
                    sessionId: 'session_luogu_global_fixed_2025',
                    ...options
                };

                // 从localStorage获取Cookie备份（使用正确的key）
                const backupCookies = localStorage.getItem('_backupCookies') || localStorage.getItem('luogu_backup_cookies');
                if (backupCookies) {
                    requestData.backupCookies = backupCookies;
                    console.log('🍪 使用Cookie备份进行API调用');
                }

                const response = await fetch('/.netlify/functions/luogu-proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error);
                }

                return result;
            } catch (error) {
                console.error('API调用失败:', error);
                throw error;
            }
        }

        // 获取CSRF令牌
        async function getCSRFToken(pid) {
            try {
                console.log(`🔑 获取题目 ${pid} 的CSRF令牌`);
                
                // 首先尝试使用当前页面的CSRF令牌
                const existingToken = document.querySelector('meta[name="csrf-token"]');
                if (existingToken) {
                    const token = existingToken.getAttribute('content');
                    console.log('✅ 使用当前页面CSRF令牌:', token.substring(0, 20) + '...');
                    return token;
                }
                
                // 如果当前页面没有CSRF令牌，尝试通过代理获取HTML页面
                console.log('🌐 当前页面无CSRF令牌，尝试获取题目页面HTML...');
                
                // 构造请求以获取HTML页面而不是API数据
                const requestData = {
                    path: `/problem/${pid}`,
                    method: 'GET',
                    headers: {
                        'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    },
                    sessionId: 'session_luogu_global_fixed_2025',
                    // 明确标记这是HTML请求
                    requestType: 'html'
                };

                // 从localStorage获取Cookie备份
                const backupCookies = localStorage.getItem('_backupCookies') || localStorage.getItem('luogu_backup_cookies');
                if (backupCookies) {
                    requestData.backupCookies = backupCookies;
                }

                const response = await fetch('/.netlify/functions/luogu-proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error);
                }
                
                // 从HTML响应中提取CSRF令牌
                let htmlContent = result.data || result.content || result;
                
                if (typeof htmlContent === 'string' && htmlContent.includes('<meta')) {
                    console.log('📄 成功获取HTML内容，长度:', htmlContent.length);
                    
                    // 提取CSRF令牌
                    const csrfMatch = htmlContent.match(/<meta[^>]*name=['"]csrf-token['"][^>]*content=['"]([^'"]+)['"][^>]*>/i);
                    if (csrfMatch && csrfMatch[1]) {
                        const csrfToken = csrfMatch[1];
                        console.log('✅ 成功从HTML提取CSRF令牌:', csrfToken.substring(0, 20) + '...');
                        return csrfToken;
                    }
                }
                
                throw new Error('无法从任何来源获取CSRF令牌');
                
            } catch (error) {
                console.error('❌ 获取CSRF令牌失败:', error);
                throw error;
            }
        }

        // 提交代码
        async function submitCode() {
            const submitBtn = document.getElementById('submitBtn');
            const submitStatus = document.getElementById('submitStatus');
            const languageSelect = document.getElementById('languageSelect');
            const codeEditor = document.getElementById('codeEditor');
            
            // 获取当前题目ID
            const urlParams = new URLSearchParams(window.location.search);
            const pid = urlParams.get('pid');
            
            if (!pid) {
                showSubmitStatus('错误：未找到题目ID', 'error');
                return;
            }
            
            // 检查登录状态
            const userInfoStr = localStorage.getItem('luogu_user_info');
            if (!userInfoStr) {
                showSubmitStatus('请先登录后再提交代码', 'error');
                return;
            }
            
            // 获取表单数据
            const language = parseInt(languageSelect.value);
            const code = codeEditor.value.trim();
            
            if (!code) {
                showSubmitStatus('请输入代码', 'error');
                return;
            }
            
            // 禁用提交按钮
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 提交中...';
            showSubmitStatus('正在获取CSRF令牌...', 'loading');
            
            try {
                // 获取CSRF令牌
                const csrfToken = await getCSRFToken(pid);
                
                showSubmitStatus('正在提交代码...', 'loading');
                
                // 提交代码
                const submitResult = await proxyLuoguAPI(`/fe/api/problem/submit/${pid}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrfToken,
                        'referer': `https://www.luogu.com.cn/problem/${pid}`,
                        'origin': 'https://www.luogu.com.cn'
                    },
                    body: {
                        lang: language,
                        code: code,
                        enableO2: 0
                    }
                });
                
                console.log('📤 代码提交结果:', submitResult);
                
                // 检查是否登录失败
                if (submitResult.status === 403 || submitResult.errorCode === 403) {
                    console.log('❌ 登录状态失效，Cookie信息:', submitResult._backupCookies);
                    showSubmitStatus('登录失败！点击"强硬措施"手动输入Cookie', 'error');
                    
                    // 显示强硬措施
                    document.getElementById('emergencyLogin').style.display = 'block';
                    return;
                }
                
                if (submitResult.data && submitResult.data.rid) {
                    showSubmitStatus(`提交成功！记录ID: ${submitResult.data.rid}`, 'success');
                    
                    // 清空代码编辑器
                    codeEditor.value = '';
                    
                    // 可以在这里添加跳转到提交记录页面的逻辑
                    setTimeout(() => {
                        if (confirm('提交成功！是否查看提交记录？')) {
                            window.open(`https://www.luogu.com.cn/record/${submitResult.data.rid}`, '_blank');
                        }
                    }, 1000);
                } else {
                    const errorMsg = submitResult.errorMessage || submitResult.data || submitResult.error || '提交失败，未返回记录ID';
                    throw new Error(errorMsg);
                }
                
            } catch (error) {
                console.error('❌ 代码提交失败:', error);
                showSubmitStatus(`提交失败: ${error.message}`, 'error');
            } finally {
                // 恢复提交按钮
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 提交代码';
            }
        }

        // 显示提交状态
        function showSubmitStatus(message, type) {
            const statusDiv = document.getElementById('submitStatus');
            statusDiv.textContent = message;
            statusDiv.className = `submit-status ${type}`;
        }
        
        // 🚀 强硬措施：显示紧急登录模式
        function showEmergencyLogin() {
            const emergencyDiv = document.getElementById('emergencyLogin');
            emergencyDiv.style.display = 'block';
            
            // 提供详细说明
            showSubmitStatus('💡 请按F12打开开发者工具，在Application/Storage > Cookies中找到洛谷的Cookie', 'info');
        }
        
        // 🚀 强硬措施：保存手动输入的Cookie
        function saveManualCookie() {
            const manualCookie = document.getElementById('manualCookie').value.trim();
            if (!manualCookie) {
                alert('请输入Cookie！');
                return;
            }
            
            // 验证Cookie格式
            if (!manualCookie.includes('_uid=') || !manualCookie.includes('__client_id=')) {
                alert('Cookie格式不正确！请确保包含_uid和__client_id字段。');
                return;
            }
            
            // 保存到localStorage作为备份
            const encodedCookie = btoa(manualCookie);
            localStorage.setItem('manual_backup_cookies', encodedCookie);
            
            console.log('🔧 手动保存Cookie:', manualCookie);
            showSubmitStatus('✅ Cookie已保存，现在可以尝试提交代码', 'success');
        }
        
        // 获取题目ID
        function getProblemIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('pid');
        }
        
        // 🪄 智能获取有效Cookie
        async function autoGetCookie() {
            showSubmitStatus('🪄 正在智能获取Cookie...', 'loading');
            
            try {
                // 获取用户的真实uid
                const userInfo = JSON.parse(localStorage.getItem('luogu_user_info') || '{}');
                const realUid = userInfo.uid;
                
                if (!realUid) {
                    showSubmitStatus('❌ 未找到用户ID，请先登录', 'error');
                    return;
                }
                
                console.log('🔍 发现用户ID:', realUid);
                
                // 第一步：向洛谷发送请求获取有效的client_id
                const response = await fetch('/.netlify/functions/luogu-proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        path: '/',
                        method: 'GET',
                        sessionId: 'cookie_acquisition_session'
                    })
                });
                
                const result = await response.json();
                console.log('🍪 服务器响应:', result);
                
                // 从响应中提取新的client_id
                if (result._backupCookies) {
                    const cookieStr = atob(result._backupCookies);
                    console.log('🔍 解码Cookie:', cookieStr);
                    
                    // 提取client_id
                    const clientIdMatch = cookieStr.match(/__client_id=([^;]+)/);
                    if (clientIdMatch) {
                        const newClientId = clientIdMatch[1];
                        console.log('✅ 获取到新的client_id:', newClientId);
                        
                        // 构造完整的有效Cookie
                        const validCookie = `_uid=${realUid}; __client_id=${newClientId}`;
                        document.getElementById('manualCookie').value = validCookie;
                        
                        showSubmitStatus('✅ 智能获取Cookie成功！已自动填入', 'success');
                        return;
                    }
                }
                
                showSubmitStatus('❌ 无法提取client_id，请手动操作', 'error');
                showCookieInstructions();
                
            } catch (error) {
                console.error('智能获取Cookie失败:', error);
                showSubmitStatus('❌ 智能获取失败，尝试其他方法...', 'error');
            }
        }
        
        // 🪄 传统方法获取Cookie（备用方案）
        async function fallbackGetCookie() {
            try {
                // 方法1：尝试通过iframe获取Cookie（同源策略允许的情况下）
                const iframe = document.createElement('iframe');
                iframe.src = 'https://www.luogu.com.cn/';
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                
                // 等待iframe加载
                await new Promise((resolve, reject) => {
                    iframe.onload = resolve;
                    iframe.onerror = reject;
                    setTimeout(reject, 10000); // 10秒超时
                });
                
                // 尝试获取iframe中的Cookie
                try {
                    const iframeCookies = iframe.contentDocument.cookie;
                    if (iframeCookies && iframeCookies.includes('_uid=')) {
                        document.getElementById('manualCookie').value = iframeCookies;
                        showSubmitStatus('✅ 自动获取Cookie成功！', 'success');
                        document.body.removeChild(iframe);
                        return;
                    }
                } catch (e) {
                    console.log('iframe方法失败，尝试其他方法:', e.message);
                }
                
                document.body.removeChild(iframe);
                
                // 方法2：打开新窗口并引导用户
                const luoguWindow = window.open('https://www.luogu.com.cn/', '_blank', 'width=800,height=600');
                
                showSubmitStatus('🌐 已打开洛谷官网，请确保已登录，然后点击下方按钮获取Cookie', 'info');
                
                // 添加获取Cookie的按钮
                const getCookieBtn = document.createElement('button');
                getCookieBtn.innerHTML = '<i class="fas fa-download"></i> 从打开的窗口获取Cookie';
                getCookieBtn.className = 'btn btn-primary btn-sm';
                getCookieBtn.style.marginTop = '10px';
                getCookieBtn.onclick = async () => {
                    try {
                        // 尝试从打开的窗口获取Cookie
                        if (luoguWindow && !luoguWindow.closed) {
                            const cookies = await getCookiesFromWindow(luoguWindow);
                            if (cookies) {
                                document.getElementById('manualCookie').value = cookies;
                                showSubmitStatus('✅ 成功获取Cookie！', 'success');
                                luoguWindow.close();
                                getCookieBtn.remove();
                                return;
                            }
                        }
                        
                        // 如果无法自动获取，提供手动指导
                        showCookieInstructions();
                        
                    } catch (error) {
                        console.error('获取Cookie失败:', error);
                        showCookieInstructions();
                    }
                };
                
                document.getElementById('emergencyLogin').appendChild(getCookieBtn);
                
            } catch (error) {
                console.error('自动获取Cookie失败:', error);
                showSubmitStatus('❌ 自动获取失败，请手动操作', 'error');
                showCookieInstructions();
            }
        }
        
        // 从窗口获取Cookie的辅助函数
        async function getCookiesFromWindow(targetWindow) {
            try {
                // 检查窗口是否可访问
                if (targetWindow.location.hostname === 'www.luogu.com.cn') {
                    return targetWindow.document.cookie;
                }
            } catch (e) {
                // 跨域限制，无法直接访问
                console.log('跨域限制，无法直接获取Cookie');
            }
            return null;
        }
        
        // 显示Cookie获取指导
        function showCookieInstructions() {
            const instructions = document.createElement('div');
            instructions.innerHTML = `
                <div style="background: #e3f2fd; border: 1px solid #2196f3; border-radius: 5px; padding: 10px; margin-top: 10px;">
                    <h5 style="color: #1976d2; margin: 0 0 10px 0;"><i class="fas fa-info-circle"></i> 获取Cookie指导</h5>
                    <ol style="margin: 0; padding-left: 20px; color: #1976d2;">
                        <li>确保在打开的洛谷窗口中已登录</li>
                        <li>在洛谷窗口中按F12打开开发者工具</li>
                        <li>切换到 Application 或 Storage 标签</li>
                        <li>点击 Cookies → www.luogu.com.cn</li>
                        <li>复制所有Cookie内容到上方文本框</li>
                        <li>格式应类似：_uid=1234567; __client_id=abc123...</li>
                    </ol>
                    <button onclick="this.parentElement.remove()" class="btn btn-sm btn-secondary" style="margin-top: 10px;">
                        <i class="fas fa-times"></i> 关闭指导
                    </button>
                </div>
            `;
            document.getElementById('emergencyLogin').appendChild(instructions);
        }
        
        // 🚀 强硬措施：直接提交（绕过所有检查）
        async function directSubmit() {
            const pid = getProblemIdFromUrl();
            const language = parseInt(document.getElementById('languageSelect').value);
            const code = document.getElementById('codeEditor').value.trim();
            const manualCookie = document.getElementById('manualCookie').value.trim();
            
            if (!code) {
                alert('请输入代码！');
                return;
            }
            
            if (!manualCookie) {
                alert('请先输入Cookie！');
                return;
            }
            
            try {
                showSubmitStatus('🚀 强硬提交中...', 'loading');
                
                // 获取CSRF令牌
                const csrfToken = await getCSRFToken(pid);
                console.log('🔧 强硬模式 - CSRF令牌:', csrfToken);
                
                // 直接调用Netlify函数，使用手动Cookie
                const response = await fetch('/.netlify/functions/luogu-proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        path: `/fe/api/problem/submit/${pid}`,
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-csrf-token': csrfToken,
                            'referer': `https://www.luogu.com.cn/problem/${pid}`,
                            'origin': 'https://www.luogu.com.cn'
                        },
                        body: {
                            lang: language,
                            code: code,
                            enableO2: 0
                        },
                        backupCookies: btoa(manualCookie), // 使用手动输入的Cookie
                        sessionId: 'manual_emergency_session'
                    })
                });
                
                const result = await response.json();
                console.log('🚀 强硬提交结果:', result);
                
                if (result.rid) {
                    showSubmitStatus(`🎉 提交成功！记录ID: ${result.rid}`, 'success');
                    setTimeout(() => {
                        if (confirm('提交成功！是否查看提交记录？')) {
                            window.open(`https://www.luogu.com.cn/record/${result.rid}`, '_blank');
                        }
                    }, 1000);
                } else {
                    showSubmitStatus(`❌提交失败: ${result.errorMessage || result.data || '未知错误'}`, 'error');
                }
                
            } catch (error) {
                console.error('🚀 强硬提交错误:', error);
                showSubmitStatus('❌ 强硬提交失败: ' + error.message, 'error');
            }
        }

        // 显示/隐藏提交区域
        function toggleSubmitSection(show) {
            const submitSection = document.getElementById('submitSection');
            const userInfoStr = localStorage.getItem('luogu_user_info');
            
            // 只有登录用户才显示提交区域
            if (show && userInfoStr) {
                submitSection.style.display = 'block';
            } else {
                submitSection.style.display = 'none';
            }
        }

        // 页面加载时获取题目ID并加载详情
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            const isLoggedIn = checkLoginStatus();
            
            const urlParams = new URLSearchParams(window.location.search);
            const pid = urlParams.get('pid');
            
            if (pid) {
                loadProblemDetail(pid);
                
                // 根据登录状态显示提交区域
                toggleSubmitSection(isLoggedIn);
            } else {
                showStatus('未指定题目ID', 'error');
            }
            
            // 绑定提交按钮事件
            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', submitCode);
            }
        });
    </script>
</body>
