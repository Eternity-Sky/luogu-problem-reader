<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题目详情 - LGOJ 题目浏览站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #10b981;
            --accent-color: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--gray-800);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gray-200);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--gray-700);
            transform: translateY(-2px);
        }

        /* Main Content */
        .main {
            padding: 2rem 0;
        }

        .problem-container {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .problem-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem;
        }

        .problem-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .problem-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .meta-label {
            font-weight: 500;
            opacity: 0.9;
        }

        .meta-value {
            font-weight: 600;
        }

        .difficulty-tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            color: white;
        }

        .difficulty-1 { background: linear-gradient(135deg, #10b981, #059669); }
        .difficulty-2 { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .difficulty-3 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .difficulty-4 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .difficulty-5 { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .difficulty-6 { background: linear-gradient(135deg, #991b1b, #7f1d1d); }
        .difficulty-7 { background: linear-gradient(135deg, #000000, #374151); }

        .problem-content {
            padding: 2rem;
        }

        .section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--gray-200);
        }

        .problem-description {
            line-height: 1.7;
            color: var(--gray-700);
        }

        .problem-description h3 {
            color: var(--gray-800);
            margin: 1.5rem 0 1rem 0;
            font-size: 1.1rem;
        }

        .problem-description p {
            margin-bottom: 1rem;
        }

        .problem-description pre {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
            font-family: 'Courier New', monospace;
        }

        .problem-description code {
            background: var(--gray-100);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--gray-600);
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 1rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .status {
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .status.info {
            background: #dbeafe;
            border: 1px solid #93c5fd;
            color: #1d4ed8;
        }

        .status.success {
            background: #d1fae5;
            border: 1px solid #86efac;
            color: #059669;
        }

        .status.error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }

        @media (max-width: 768px) {
            .problem-title {
                font-size: 1.5rem;
            }
            
            .problem-meta {
                grid-template-columns: 1fr;
            }
            
            .header-container {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-container">
            <a href="/" class="logo">
                <i class="fas fa-book"></i>
                LGOJ
            </a>
            <a href="/problems.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                返回题目列表
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- API测试区域 -->
            <div class="problem-container" style="margin-bottom: 2rem;">
                <div class="problem-header">
                    <div class="problem-title">API 测试</div>
                </div>
                <div class="problem-content">
                    <div class="section">
                        <div class="section-title">测试题目详情API</div>
                        <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
                            <input type="text" id="testPid" placeholder="输入题目ID (如: P1001)" 
                                   style="padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; flex: 1;">
                            <button onclick="testProblemAPI()" 
                                    style="padding: 0.5rem 1rem; background: var(--primary-color); color: white; border: none; border-radius: 4px; cursor: pointer;">
                                测试API
                            </button>
                        </div>
                        <div id="apiTestStatus"></div>
                        <pre id="apiTestResult" style="background: #f5f5f5; padding: 1rem; border-radius: 4px; max-height: 400px; overflow-y: auto; display: none;"></pre>
                    </div>
                </div>
            </div>
            
            <div id="loadingStatus" class="loading">
                <i class="fas fa-spinner"></i>
                <div>正在加载题目详情...</div>
            </div>
            
            <div id="problemContainer" class="problem-container" style="display: none;">
                <!-- 题目内容将在这里动态加载 -->
            </div>
        </div>
    </main>

    <script>
        // 获取难度文本
        function getDifficultyText(difficulty) {
            const texts = {
                0: '暂无评定',
                1: '入门',
                2: '普及-',
                3: '普及/提高-',
                4: '普及+/提高',
                5: '提高+/省选-',
                6: '省选/NOI-',
                7: 'NOI/NOI+/CTSC'
            };
            return texts[difficulty] || '未知';
        }

        // 代理函数 - 通过Netlify Functions调用洛谷API
        async function proxyLuoguAPI(path, options = {}) {
            const requestData = {
                path: path,
                method: options.method || 'GET',
                headers: {
                    'x-lentille-request': 'content-only',
                    ...options.headers
                },
                sessionId: 'session_luogu_global_fixed_2025',
                ...options
            };

            console.log('🔍 API请求:', requestData);

            try {
                const response = await fetch('/.netlify/functions/luogu-proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                console.log('📡 HTTP响应状态:', response.status, response.statusText);

                const responseText = await response.text();
                console.log('📄 响应原始文本 (前500字符):', responseText.substring(0, 500));

                let result;
                try {
                    result = JSON.parse(responseText);
                    console.log('✅ JSON解析成功:', result);
                } catch (parseError) {
                    console.error('❌ JSON解析失败:', parseError);
                    return {
                        error: `JSON解析失败: ${parseError.message}`,
                        rawResponse: responseText,
                        httpStatus: response.status
                    };
                }

                return result;
            } catch (error) {
                console.error('❌ 网络请求失败:', error);
                return {
                    error: `网络请求失败: ${error.message}`,
                    networkError: true
                };
            }
        }

        // 显示状态消息
        function showStatus(message, type = 'info') {
            const loadingDiv = document.getElementById('loadingStatus');
            loadingDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        // API测试函数
        async function testProblemAPI() {
            const pid = document.getElementById('testPid').value || 'P1001';
            const statusDiv = document.getElementById('apiTestStatus');
            const resultDiv = document.getElementById('apiTestResult');
            
            statusDiv.innerHTML = '<div class="status info">正在测试API...</div>';
            resultDiv.style.display = 'none';
            
            console.log('🧪 测试题目详情API:', pid);
            
            try {
                const result = await proxyLuoguAPI(`/problem/${pid}`, {
                    headers: {
                        'x-lentille-request': 'content-only'
                    }
                });
                
                statusDiv.innerHTML = '<div class="status success">API调用成功！查看下方原始数据</div>';
                resultDiv.textContent = JSON.stringify(result, null, 2);
                resultDiv.style.display = 'block';
                
                console.log('✅ API测试结果:', result);
                
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">API调用失败: ${error.message}</div>`;
                console.error('❌ API测试失败:', error);
            }
        }

        // 加载题目详情
        async function loadProblemDetail(pid) {
            console.log('📋 加载题目详情:', pid);
            
            try {
                showStatus('正在获取题目详情...', 'info');
                
                const result = await proxyLuoguAPI(`/problem/${pid}`, {
                    headers: {
                        'x-lentille-request': 'content-only'
                    }
                });
                
                if (result.error) {
                    showStatus(`加载失败: ${result.error}`, 'error');
                    return;
                }

                console.log('✅ 题目详情加载成功:', result);
                displayProblemDetail(result);
                
            } catch (error) {
                showStatus(`请求失败: ${error.message}`, 'error');
                console.error('题目详情加载错误:', error);
            }
        }

        // 显示题目详情
        function displayProblemDetail(apiResult) {
            const container = document.getElementById('problemContainer');
            const loadingDiv = document.getElementById('loadingStatus');
            
            console.log('🎨 开始解析题目详情数据:', apiResult);
            
            // 尝试从不同的数据结构中提取题目数据
            let problem = null;
            
            if (apiResult.data && apiResult.data.problem) {
                problem = apiResult.data.problem;
                console.log('✅ 使用data.problem数据结构');
            } else if (apiResult.currentData && apiResult.currentData.problem) {
                problem = apiResult.currentData.problem;
                console.log('✅ 使用currentData.problem数据结构');
            } else if (apiResult.problem) {
                problem = apiResult.problem;
                console.log('✅ 使用直接problem数据结构');
            }

            if (!problem) {
                showStatus('未找到题目数据', 'error');
                console.log('❌ 未找到题目数据，原始响应:', apiResult);
                return;
            }

            const difficultyText = getDifficultyText(problem.difficulty);
            const difficultyClass = `difficulty-${problem.difficulty || 0}`;
            
            container.innerHTML = `
                <div class="problem-header">
                    <div class="problem-title">${problem.pid} - ${problem.title}</div>
                    <div class="problem-meta">
                        <div class="meta-item">
                            <i class="fas fa-signal"></i>
                            <span class="meta-label">难度:</span>
                            <span class="difficulty-tag ${difficultyClass}">${difficultyText}</span>
                        </div>
                        <div class="meta-item">
                            <i class="fas fa-check-circle"></i>
                            <span class="meta-label">通过:</span>
                            <span class="meta-value">${problem.totalAccepted || 0}</span>
                        </div>
                        <div class="meta-item">
                            <i class="fas fa-paper-plane"></i>
                            <span class="meta-label">提交:</span>
                            <span class="meta-value">${problem.totalSubmit || 0}</span>
                        </div>
                        <div class="meta-item">
                            <i class="fas fa-percentage"></i>
                            <span class="meta-label">通过率:</span>
                            <span class="meta-value">${problem.totalSubmit > 0 ? ((problem.totalAccepted || 0) / problem.totalSubmit * 100).toFixed(1) + '%' : 'N/A'}</span>
                        </div>
                    </div>
                </div>
                <div class="problem-content">
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-file-alt"></i>
                            题目描述
                        </div>
                        <div class="problem-description">
                            ${problem.description || '暂无题目描述'}
                        </div>
                    </div>
                    
                    ${problem.inputFormat ? `
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-sign-in-alt"></i>
                            输入格式
                        </div>
                        <div class="problem-description">
                            ${problem.inputFormat}
                        </div>
                    </div>
                    ` : ''}
                    
                    ${problem.outputFormat ? `
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-sign-out-alt"></i>
                            输出格式
                        </div>
                        <div class="problem-description">
                            ${problem.outputFormat}
                        </div>
                    </div>
                    ` : ''}
                    
                    ${problem.samples && problem.samples.length > 0 ? `
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-code"></i>
                            样例
                        </div>
                        ${problem.samples.map((sample, index) => `
                            <div style="margin-bottom: 1.5rem;">
                                <h3>样例 ${index + 1}</h3>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                    <div>
                                        <strong>输入:</strong>
                                        <pre>${sample.input || ''}</pre>
                                    </div>
                                    <div>
                                        <strong>输出:</strong>
                                        <pre>${sample.output || ''}</pre>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ` : ''}
                    
                    ${problem.hint ? `
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-lightbulb"></i>
                            提示
                        </div>
                        <div class="problem-description">
                            ${problem.hint}
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;
            
            // 隐藏加载状态，显示题目内容
            loadingDiv.style.display = 'none';
            container.style.display = 'block';
            
            // 更新页面标题
            document.title = `${problem.pid} - ${problem.title} - LGOJ 题目浏览站`;
        }

        // 页面加载时获取题目ID并加载详情
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const pid = urlParams.get('pid');
            
            if (pid) {
                // 如果有PID参数，填入测试框并可选择性加载
                document.getElementById('testPid').value = pid;
                showStatus(`检测到题目ID: ${pid}，可以点击"测试API"按钮查看数据结构`, 'info');
            } else {
                showStatus('可以手动输入题目ID测试API返回数据', 'info');
            }
        });
    </script>
</body>
</html>
