<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题目详情 - LGOJ 题目浏览站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Markdown渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- KaTeX数学公式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #10b981;
            --accent-color: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--gray-800);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gray-200);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--gray-700);
            transform: translateY(-2px);
        }

        /* Main Content */
        .main {
            padding: 2rem 0;
        }

        .problem-container {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .problem-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem;
        }

        .problem-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .problem-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .meta-label {
            font-weight: 500;
            opacity: 0.9;
        }

        .meta-value {
            font-weight: 600;
        }

        .difficulty-tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            color: white;
        }

        .difficulty-1 { background: linear-gradient(135deg, #10b981, #059669); }
        .difficulty-2 { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .difficulty-3 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .difficulty-4 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .difficulty-5 { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .difficulty-6 { background: linear-gradient(135deg, #991b1b, #7f1d1d); }
        .difficulty-7 { background: linear-gradient(135deg, #000000, #374151); }

        .problem-content {
            padding: 2rem;
        }

        .section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--gray-200);
        }

        .problem-description {
            line-height: 1.7;
            color: var(--gray-700);
        }

        .problem-description h3 {
            color: var(--gray-800);
            margin: 1.5rem 0 1rem 0;
            font-size: 1.1rem;
        }

        .problem-description p {
            margin-bottom: 1rem;
        }

        .problem-description pre {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 0;
            overflow: hidden;
            margin: 1rem 0;
            font-family: 'Courier New', monospace;
            position: relative;
        }

        .code-block {
            position: relative;
            background: var(--gray-50);
            border-radius: 8px;
            overflow: hidden;
        }

        .code-header {
            background: var(--gray-100);
            border-bottom: 1px solid var(--gray-200);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            color: var(--gray-600);
        }

        .code-language {
            font-weight: 500;
        }

        .copy-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .copy-btn:hover {
            background: var(--gray-700);
        }

        .copy-btn.copied {
            background: var(--secondary-color);
        }

        .code-content {
            padding: 1rem;
            overflow-x: auto;
            background: var(--gray-50);
        }

        .problem-description code {
            background: var(--gray-100);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        /* 行内代码不应用代码块样式 */
        .problem-description p code,
        .problem-description li code {
            background: var(--gray-100);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        /* 图片响应式样式 */
        .problem-description img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin: 1rem 0;
            display: block;
        }

        /* 大图片居中显示 */
        .problem-description img[width], 
        .problem-description img[style*="width"] {
            max-width: 100% !important;
            width: auto !important;
            height: auto !important;
        }

        /* 图片容器 */
        .problem-description p:has(img) {
            text-align: center;
        }

        /* 确保所有媒体元素都响应式 */
        .problem-description video,
        .problem-description iframe,
        .problem-description embed,
        .problem-description object {
            max-width: 100%;
            height: auto;
        }

        /* KaTeX数学公式样式 */
        .katex {
            font-size: 1.1em;
        }

        .katex-display {
            margin: 1rem 0;
            text-align: center;
        }

        /* Markdown渲染样式 */
        .problem-description h1,
        .problem-description h2,
        .problem-description h3,
        .problem-description h4 {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .problem-description ul,
        .problem-description ol {
            margin: 1rem 0;
            padding-left: 2rem;
        }

        .problem-description li {
            margin: 0.5rem 0;
        }

        .problem-description blockquote {
            border-left: 4px solid var(--primary-color);
            margin: 1rem 0;
            padding: 1rem;
            background: var(--gray-50);
            border-radius: 0 8px 8px 0;
        }

        .problem-description table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .problem-description th,
        .problem-description td {
            border: 1px solid var(--gray-300);
            padding: 0.75rem;
            text-align: left;
        }

        .problem-description th {
            background: var(--gray-100);
            font-weight: 600;
        }

        /* 评论区域样式 */
        .comments-section {
            margin-top: 3rem;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
        }

        .comments-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--gray-600);
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 1rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .status {
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .status.info {
            background: #dbeafe;
            border: 1px solid #93c5fd;
            color: #1d4ed8;
        }

        .status.success {
            background: #d1fae5;
            border: 1px solid #86efac;
            color: #059669;
        }

        .status.error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }

        /* 用户信息样式 */
        .user-info {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: none;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .user-info.show {
            display: flex;
            align-items: center;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin-right: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .user-uid {
            opacity: 0.8;
            font-size: 0.875rem;
        }

        .login-prompt {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
        }

        .login-prompt.show {
            display: block;
        }

        .login-btn {
            background: var(--primary-color);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            margin-top: 0.5rem;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background: var(--gray-700);
            color: white;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .problem-title {
                font-size: 1.5rem;
            }
            
            .problem-meta {
                grid-template-columns: 1fr;
            }
            
            .header-container {
                flex-direction: column;
                gap: 1rem;
            }
            
            .user-info {
                padding: 0.75rem;
            }
            
            .user-avatar {
                width: 40px;
                height: 40px;
            }
            
            /* 移动端图片优化 */
            .problem-description img {
                margin: 0.5rem auto;
                max-width: calc(100vw - 2rem);
                border-radius: 6px;
            }
            
            /* 移动端代码块优化 */
            .code-content {
                padding: 0.75rem;
                font-size: 0.875rem;
            }
            
            .code-header {
                padding: 0.375rem 0.75rem;
                font-size: 0.8rem;
            }
            
            /* 移动端容器优化 */
            .container {
                padding: 0 1rem;
            }
            
            .problem-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-container">
            <a href="/" class="logo">
                <i class="fas fa-book"></i>
                LGOJ
            </a>
            <a href="/problems.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                返回题目列表
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- 用户信息显示 -->
            <div id="userInfo" class="user-info">
                <img id="userAvatar" class="user-avatar" src="" alt="用户头像">
                <div class="user-details">
                    <div id="userName" class="user-name"></div>
                    <div id="userUid" class="user-uid"></div>
                </div>
            </div>

            <!-- 登录提示 -->
            <div id="loginPrompt" class="login-prompt">
                <div>
                    <i class="fas fa-user-circle" style="font-size: 2rem; color: var(--gray-400); margin-bottom: 0.5rem;"></i>
                    <p style="margin: 0.5rem 0; color: var(--gray-600);">登录后可以提交代码、查看提交记录等更多功能</p>
                    <a href="/login.html" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        立即登录
                    </a>
                </div>
            </div>
            
            <div id="loadingStatus" class="loading">
                <i class="fas fa-spinner"></i>
                <div>正在加载题目详情...</div>
            </div>
            
            <div id="problemContainer" class="problem-container" style="display: none;">
                <!-- 题目内容将在这里动态加载 -->
            </div>
            
            <!-- 评论区域 -->
            <div id="commentsSection" class="comments-section" style="display: none;">
                <div class="comments-title">
                    <i class="fas fa-comments"></i>
                    讨论区
                </div>
                <script src="https://giscus.app/client.js"
                        data-repo="Eternity-Sky/luogu-problem-reader"
                        data-repo-id="R_kgDOPiP5uw"
                        data-category="Announcements"
                        data-category-id="DIC_kwDOPiP5u84CugHo"
                        data-mapping="url"
                        data-strict="0"
                        data-reactions-enabled="1"
                        data-emit-metadata="0"
                        data-input-position="bottom"
                        data-theme="light"
                        data-lang="zh-CN"
                        crossorigin="anonymous"
                        async>
                </script>
            </div>
        </div>
    </main>

    <script>
        // 获取难度文本
        function getDifficultyText(difficulty) {
            const texts = {
                0: '暂无评定',
                1: '入门',
                2: '普及-',
                3: '普及/提高-',
                4: '普及+/提高',
                5: '提高+/省选-',
                6: '省选/NOI-',
                7: 'NOI/NOI+/CTSC'
            };
            return texts[difficulty] || '未知';
        }

        // 代理函数 - 通过Netlify Functions调用洛谷API
        async function proxyLuoguAPI(path, options = {}) {
            const requestData = {
                path: path,
                method: options.method || 'GET',
                headers: {
                    'x-lentille-request': 'content-only',
                    ...options.headers
                },
                sessionId: 'session_luogu_global_fixed_2025',
                ...options
            };

            console.log('🔍 API请求:', requestData);

            try {
                const response = await fetch('/.netlify/functions/luogu-proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                console.log('📡 HTTP响应状态:', response.status, response.statusText);

                const responseText = await response.text();
                console.log('📄 响应原始文本 (前500字符):', responseText.substring(0, 500));

                let result;
                try {
                    result = JSON.parse(responseText);
                    console.log('✅ JSON解析成功:', result);
                } catch (parseError) {
                    console.error('❌ JSON解析失败:', parseError);
                    return {
                        error: `JSON解析失败: ${parseError.message}`,
                        rawResponse: responseText,
                        httpStatus: response.status
                    };
                }

                return result;
            } catch (error) {
                console.error('❌ 网络请求失败:', error);
                return {
                    error: `网络请求失败: ${error.message}`,
                    networkError: true
                };
            }
        }

        // 显示状态消息
        function showStatus(message, type = 'info') {
            const loadingDiv = document.getElementById('loadingStatus');
            loadingDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }



        // 加载题目详情
        async function loadProblemDetail(pid) {
            console.log('📋 加载题目详情:', pid);
            
            try {
                showStatus('正在获取题目详情...', 'info');
                
                const result = await proxyLuoguAPI(`/problem/${pid}`, {
                    headers: {
                        'x-lentille-request': 'content-only'
                    }
                });
                
                if (result.error) {
                    showStatus(`加载失败: ${result.error}`, 'error');
                    return;
                }

                console.log('✅ 题目详情加载成功:', result);
                displayProblemDetail(result);
                
            } catch (error) {
                showStatus(`请求失败: ${error.message}`, 'error');
                console.error('题目详情加载错误:', error);
            }
        }

        // 显示题目详情
        function displayProblemDetail(apiResult) {
            const container = document.getElementById('problemContainer');
            const loadingDiv = document.getElementById('loadingStatus');
            
            console.log('🎨 开始解析题目详情数据:', apiResult);
            
            // 根据实际API数据结构提取题目数据
            let problem = null;
            
            if (apiResult.data && apiResult.data.problem) {
                problem = apiResult.data.problem;
                console.log('✅ 使用data.problem数据结构');
            } else {
                showStatus('未找到题目数据', 'error');
                console.log('❌ 未找到题目数据，原始响应:', apiResult);
                return;
            }

            const difficultyText = getDifficultyText(problem.difficulty);
            const difficultyClass = `difficulty-${problem.difficulty || 0}`;
            
            // 获取题目内容（优先使用content，fallback到contenu）
            const content = problem.content || problem.contenu || {};
            
            container.innerHTML = `
                <div class="problem-header">
                    <div class="problem-title">${problem.pid} - ${problem.title}</div>
                    <div class="problem-meta">
                        <div class="meta-item">
                            <i class="fas fa-signal"></i>
                            <span class="meta-label">难度:</span>
                            <span class="difficulty-tag ${difficultyClass}">${difficultyText}</span>
                        </div>
                        <div class="meta-item">
                            <i class="fas fa-check-circle"></i>
                            <span class="meta-label">通过:</span>
                            <span class="meta-value">${problem.totalAccepted || 0}</span>
                        </div>
                        <div class="meta-item">
                            <i class="fas fa-paper-plane"></i>
                            <span class="meta-label">提交:</span>
                            <span class="meta-value">${problem.totalSubmit || 0}</span>
                        </div>
                        <div class="meta-item">
                            <i class="fas fa-percentage"></i>
                            <span class="meta-label">通过率:</span>
                            <span class="meta-value">${problem.totalSubmit > 0 ? ((problem.totalAccepted || 0) / problem.totalSubmit * 100).toFixed(1) + '%' : 'N/A'}</span>
                        </div>
                    </div>
                </div>
                <div class="problem-content">
                    ${content.background ? `
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-info-circle"></i>
                            题目背景
                        </div>
                        <div class="problem-description">
                            ${formatContent(content.background)}
                        </div>
                    </div>
                    ` : ''}
                    
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-file-alt"></i>
                            题目描述
                        </div>
                        <div class="problem-description">
                            ${formatContent(content.description || '暂无题目描述')}
                        </div>
                    </div>
                    
                    ${content.formatI ? `
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-sign-in-alt"></i>
                            输入格式
                        </div>
                        <div class="problem-description">
                            ${formatContent(content.formatI)}
                        </div>
                    </div>
                    ` : ''}
                    
                    ${content.formatO ? `
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-sign-out-alt"></i>
                            输出格式
                        </div>
                        <div class="problem-description">
                            ${formatContent(content.formatO)}
                        </div>
                    </div>
                    ` : ''}
                    
                    ${problem.samples && problem.samples.length > 0 ? `
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-code"></i>
                            样例
                        </div>
                        ${problem.samples.map((sample, index) => `
                            <div style="margin-bottom: 1.5rem;">
                                <h3>样例 ${index + 1}</h3>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                    <div>
                                        <strong>输入:</strong>
                                        <pre>${sample[0] || ''}</pre>
                                    </div>
                                    <div>
                                        <strong>输出:</strong>
                                        <pre>${sample[1] || ''}</pre>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ` : ''}
                    
                    ${content.hint ? `
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-lightbulb"></i>
                            提示
                        </div>
                        <div class="problem-description">
                            ${formatContent(content.hint)}
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;
            
            // 隐藏加载状态，显示题目内容
            loadingDiv.style.display = 'none';
            container.style.display = 'block';
            
            // 显示评论区
            document.getElementById('commentsSection').style.display = 'block';
            
            // 渲染数学公式
            setTimeout(() => {
                renderMath(container);
            }, 500);
            
            // 额外的数学公式渲染尝试（确保KaTeX库完全加载）
            setTimeout(() => {
                if (typeof renderMathInElement !== 'undefined') {
                    renderMath(container);
                } else {
                    console.warn('⚠️ KaTeX库仍未加载，尝试重新渲染');
                    // 再次尝试
                    setTimeout(() => renderMath(container), 1000);
                }
            }, 1500);
            
            // 更新页面标题
            document.title = `${problem.pid} - ${problem.title} - LGOJ 题目浏览站`;
        }

        // 格式化内容，处理Markdown和KaTeX数学公式
        function formatContent(content) {
            if (!content) return '';
            
            try {
                // 配置marked选项
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    sanitize: false,
                    highlight: function(code, lang) {
                        return code; // 简单的代码高亮，可以后续扩展
                    }
                });
                
                // 使用marked渲染Markdown
                let html = marked.parse(content);
                
                // 处理代码块，添加复制功能
                html = html.replace(/<pre><code(?:\s+class="language-(\w+)")?>([\s\S]*?)<\/code><\/pre>/g, function(match, lang, code) {
                    const language = lang || 'text';
                    const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
                    
                    return `
                        <div class="code-block">
                            <div class="code-header">
                                <span class="code-language">${language}</span>
                                <button class="copy-btn" onclick="copyCode('${codeId}')">
                                    <i class="fas fa-copy"></i>
                                    复制
                                </button>
                            </div>
                            <div class="code-content">
                                <pre id="${codeId}"><code>${code}</code></pre>
                            </div>
                        </div>
                    `;
                });
                
                return html;
            } catch (error) {
                console.warn('Markdown渲染失败，使用简单格式化:', error);
                
                // 降级处理：简单的文本格式化
                content = content.replace(/\n/g, '<br>');
                content = content.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
                
                // 处理代码块并添加复制功能
                content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
                    const language = lang || 'text';
                    const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
                    
                    return `
                        <div class="code-block">
                            <div class="code-header">
                                <span class="code-language">${language}</span>
                                <button class="copy-btn" onclick="copyCode('${codeId}')">
                                    <i class="fas fa-copy"></i>
                                    复制
                                </button>
                            </div>
                            <div class="code-content">
                                <pre id="${codeId}"><code>${code}</code></pre>
                            </div>
                        </div>
                    `;
                });
                
                content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                
                return content;
            }
        }

        // 渲染KaTeX数学公式
        function renderMath(element) {
            if (typeof renderMathInElement !== 'undefined') {
                try {
                    console.log('🔢 开始渲染KaTeX数学公式');
                    renderMathInElement(element, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false,
                        errorColor: '#cc0000',
                        strict: false,
                        trust: true,
                        macros: {
                            "\\def": "\\gdef",
                            "\\arraystretch": "\\def\\arraystretch{#1}",
                            "\\rm": "\\mathrm",
                            "\\mathclap": "\\mathrlap{\\phantom{#1}}\\mathllap{#1}",
                            "\\kern": "\\hspace"
                        }
                    });
                    console.log('✅ KaTeX数学公式渲染完成');
                } catch (error) {
                    console.error('❌ KaTeX渲染失败:', error);
                }
            } else {
                console.warn('⚠️ KaTeX库未加载');
                // 尝试重新加载KaTeX
                setTimeout(() => {
                    if (typeof renderMathInElement !== 'undefined') {
                        renderMath(element);
                    }
                }, 1000);
            }
        }

        // 复制代码功能
        function copyCode(codeId) {
            const codeElement = document.getElementById(codeId);
            const button = codeElement.closest('.code-block').querySelector('.copy-btn');
            
            if (!codeElement) {
                console.error('代码元素未找到:', codeId);
                return;
            }

            const codeText = codeElement.textContent || codeElement.innerText;
            
            // 使用现代 Clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(codeText).then(() => {
                    showCopySuccess(button);
                }).catch(err => {
                    console.error('复制失败:', err);
                    fallbackCopyTextToClipboard(codeText, button);
                });
            } else {
                // 降级方案
                fallbackCopyTextToClipboard(codeText, button);
            }
        }

        // 降级复制方案
        function fallbackCopyTextToClipboard(text, button) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            
            // 避免滚动到底部
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showCopySuccess(button);
                } else {
                    showCopyError(button);
                }
            } catch (err) {
                console.error('降级复制失败:', err);
                showCopyError(button);
            }
            
            document.body.removeChild(textArea);
        }

        // 显示复制成功状态
        function showCopySuccess(button) {
            const originalContent = button.innerHTML;
            button.innerHTML = '<i class="fas fa-check"></i> 已复制';
            button.classList.add('copied');
            
            setTimeout(() => {
                button.innerHTML = originalContent;
                button.classList.remove('copied');
            }, 2000);
        }

        // 显示复制错误状态
        function showCopyError(button) {
            const originalContent = button.innerHTML;
            button.innerHTML = '<i class="fas fa-times"></i> 复制失败';
            button.style.background = '#ef4444';
            
            setTimeout(() => {
                button.innerHTML = originalContent;
                button.style.background = '';
            }, 2000);
        }

        // 代理API调用函数（复用登录页面的逻辑）
        async function proxyLuoguAPI(path, options = {}) {
            try {
                const requestData = {
                    path: path,
                    method: options.method || 'GET',
                    headers: {
                        'x-luogu-type': 'content-only',
                        ...options.headers
                    },
                    sessionId: 'session_luogu_global_fixed_2025',
                    ...options
                };

                // 从localStorage获取Cookie备份（使用正确的key）
                const backupCookies = localStorage.getItem('_backupCookies') || localStorage.getItem('luogu_backup_cookies');
                if (backupCookies) {
                    requestData.backupCookies = backupCookies;
                    console.log('🍪 使用Cookie备份进行API调用');
                }

                const response = await fetch('/.netlify/functions/luogu-proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error);
                }

                return result;
            } catch (error) {
                console.error('API调用失败:', error);
                throw error;
            }
        }

        // 页面加载时获取题目ID并加载详情
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            checkLoginStatus();
            
            const urlParams = new URLSearchParams(window.location.search);
            const pid = urlParams.get('pid');
            
            if (pid) {
                loadProblemDetail(pid);
            } else {
                showStatus('未指定题目ID', 'error');
            }
        });
    </script>
